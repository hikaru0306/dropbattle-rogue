<script>

  var h = R.createElement;

  var FONT = "'M PLUS Rounded 1c','Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif";

// ===== 基本設定 =====
const SIZE = 6;
const TOTAL = SIZE * SIZE;
const P_MAX = 300;
const NUM_SPECIAL = 5;
const STAR_THRESHOLD = 6;
const ATK_PER = 10, DEF_PER = 10, HEAL_PER = 1;

const ROWS = 8; // マップの段数(固定高さに収まる上限)。近道エッジによりルート長は約6〜8で変動する
const ACTS = 3;

const MAP_GRAD = [
  "linear-gradient(180deg,#1b3a30 0%,#132821 48%,#0b1712 100%)", // 翠緑の森
  "linear-gradient(180deg,#2c1d40 0%,#1d1330 48%,#110c1d 100%)", // 毒霧の沼窟
  "linear-gradient(180deg,#3b1d1a 0%,#271113 48%,#150c0d 100%)"  // 灼熱の魔城

  { light:["slime","bat","wolf","bee","crow","pixie"], mid:["slime","wolf","spore","mandra","pixie","fox","crow"], heavy:["imp","boar","snail","mandra","fox"] },
  { light:["bat","shade","eel","wisp","toad"], mid:["shade","toad","eel","wisp","sludge","spore","turtle"], heavy:["golem","mudman","crab","scorp","turtle"] },
  { light:["shade","hound","skel","sala"], mid:["scorp","sala","hound","skel","ifrita","spore","wraith"], heavy:["golem","gargo","knight","bomber","wraith"] }
];

const DROPS = {
  0: { c1:"#ef8078", c2:"#d84a40", c3:"#7e2620", glow:"#d84a40" },
  1: { c1:"#f3c96e", c2:"#dfa03a", c3:"#8a5c1a", glow:"#dfa03a" },
  2: { c1:"#b795e6", c2:"#8d63cf", c3:"#4e3078", glow:"#8d63cf" },
  3: { c1:"#6fd1b8", c2:"#379e8b", c3:"#1c584c", glow:"#379e8b" },
  4: { c1:"#767083", c2:"#575064", c3:"#2e2938", glow:"#575064" },
  5: { c1:"#6fa8f3", c2:"#3f74d6", c3:"#1d3a78", glow:"#3f74d6" }
};
const JUNK = 4;

const ITEMS = {
  star: { mark:"★", img:"assets/mk_star.png", color:"#fff7d6", ring:"rgba(255,221,90,.95)", glowc:"#ffd54a", name:"スター", desc:"6個以上同時消しで効果(★の数+1)倍" },
  plus: { mark:"＋", img:"assets/mk_plus.png", color:"#eafaff", ring:"rgba(120,210,255,.95)", glowc:"#8ad8ff", name:"プラス", desc:"消した数を+1する" },
  three:{ mark:"3", img:"assets/mk_three.png", color:"#ffe1b0", ring:"rgba(255,150,40,.95)", glowc:"#ff9d2e", name:"トリプル", desc:"ちょうど3個で消すと3倍" },
  pierce:{ mark:"貫", img:"assets/mk_pierce.png", color:"#ffe6f0", ring:"rgba(255,120,190,.95)", glowc:"#f06aae", name:"貫通", desc:"消すと今ターンの攻撃が敵を貫通する" },

  store:{ mark:"蓄", img:"assets/mk_store.png", color:"#e6dcff", ring:"rgba(141,99,207,.95)", glowc:"#8d63cf", name:"蓄積石", desc:"【ノア専用】どの色で消しても蓄積が+1される", exclusive:"store" }

// simpleStart: 初回チュートリアル用。1戦目(row0)は分岐なし単一・2戦目(row1)は通常バトル固定
const genMap = (simpleStart) => {
  let id = 0;
  const rows = [];
  for (let r = 0; r < ROWS; r++) {
    let types;
    if (r === 0) types = simpleStart ? ["battle"] : ["battle","battle"];
    else if (r === 1 && simpleStart) types = ["battle","battle"];
    else if (r === ROWS-1) types = ["boss"];
    else if (r === ROWS-2) types = shuffle(["rest","elite"]);
    else {
      const n = 2 + (Math.random() < 0.55 ? 1 : 0);
      types = Array.from({length:n}, () => {
        const x = Math.random();
        return x<0.40?"battle":x<0.60?"horde":x<0.74?"elite":x<0.88?"treasure":"rest";
      });
      if (!types.some(t => t==="battle"||t==="horde")) types[0] = "battle";
      if (types.filter(t=>t==="rest").length > 1) types[types.indexOf("rest")] = "battle";
    }
    rows.push(types.map((t,c) => ({ id:id++, row:r, col:c, n:types.length, type:t })));
  }
  const edges = [];
  for (let r = 0; r < ROWS-1; r++) {
    const a = rows[r], b = rows[r+1];
    const n0 = a.length, n1 = b.length;
    a.forEach((na,i) => {
      const js = Math.floor(i*n1/n0), je = Math.floor(((i+1)*n1-1)/n0);
      for (let j=js; j<=je; j++) edges.push({ from:na.id, to:b[j].id });
      if (n0===n1 && i+1<n1) edges.push({ from:na.id, to:b[i+1].id });
    });
  }
  // ===== 近道エッジ: ルートによって通過する層数が変わるよう、一部ノードに1層飛ばす分岐を足す =====
  // 開始直後(row0)とボス手前(row ROWS-2 以降)は除外。近道を多く通るルートほど短くなる（約7〜10層）。
  for (let r = 1; r < ROWS - 3; r++) {
    const a = rows[r], c = rows[r + 2];
    a.forEach((na, i) => {
      if (Math.random() < 0.34) {
        const j = c.length === 1 ? 0 : Math.min(c.length - 1, Math.round(i * (c.length - 1) / Math.max(1, a.length - 1)));
        if (!edges.some(e => e.from === na.id && e.to === c[j].id)) edges.push({ from: na.id, to: c[j].id });
      }
    });
  }
  // ===== 強敵(elite)の配置制約: 1章あたり最大5つ / 1ルート最大3つ =====
  const nodes = rows.flat();
  const byId = new Map(nodes.map(n => [n.id, n]));
  const succ = new Map(nodes.map(n => [n.id, []]));
  edges.forEach(e => succ.get(e.from).push(e.to));
  const elites = () => nodes.filter(n => n.type === "elite");
  const demote = n => { n.type = "battle"; };
  // (1) 総数を5以下に（超過分をランダムに通常戦へ）
  let es = elites();
  while (es.length > 5) { demote(es[Math.floor(Math.random() * es.length)]); es = elites(); }
  // (2) どのルートでも強敵は最大3つまで。各ノードから最下層までの最大強敵数をDPで求め、
  //     最大ルート上の強敵を1つ通常戦に落とす、を上限内に収まるまで繰り返す
  const routeMax = () => {
    const memo = new Map();
    const dfs = id => {
      if (memo.has(id)) return memo.get(id);
      let best = 0; for (const k of succ.get(id)) best = Math.max(best, dfs(k));
      const v = (byId.get(id).type === "elite" ? 1 : 0) + best;
      memo.set(id, v); return v;
    };
    let mx = 0; for (const s of rows[0]) mx = Math.max(mx, dfs(s.id));
    return { mx, memo };
  };
  for (let guard = 0; guard < 60; guard++) {
    const { mx, memo } = routeMax();
    if (mx <= 3) break;
    let cur = rows[0].reduce((a, b) => memo.get(b.id) > memo.get(a.id) ? b : a).id;
    const onPath = [];
    while (true) {
      const n = byId.get(cur);
      if (n.type === "elite") onPath.push(n);
      const kids = succ.get(cur);
      if (!kids.length) break;
      cur = kids.reduce((a, b) => memo.get(b) > memo.get(a) ? b : a);
    }
    if (!onPath.length) break;
    demote(onPath[Math.floor(onPath.length / 2)]);
  }
  return { nodes, edges, rows };
};

      pat: pick(k.pats), rollMul: rollDmg(),
      atkFloor: (act >= 1 && e.elite) ? 60 : 0, bigFloor: (act >= 1 && e.elite) ? 120 : 0, // 2章以降エリートの火力下限
      enr: 0, enrEvery: SIM_MODE ? 0 : 4 + Math.floor(Math.random() * 3),

      dcap: ((e.boss && Math.random() < 0.5) || (e.elite && Math.random() < 0.35)) ? Math.max(10, Math.round(hp / 4.5 / 10) * 10) : 0,

const refillBag = owned => ({ ...owned });

const drawFromBag = (bagRef, ownedRef, bagUpRef, ownedUpRef, cellsNow) => {
  if (bagTotal(bagRef.current) <= 0) {
    // 盤面に残っている特殊ドロップは補充から除外（推測可能性の担保）
    const onB = initZero(), onBU = initZero();
    for (const c of (cellsNow || [])) if (c && c.special) { onB[c.special]++; if (c.up) onBU[c.special]++; }
    const nb = {}, nbu = {};

      nb[k] = Math.max(0, ownedRef.current[k] - onB[k]);
      nbu[k] = Math.max(0, (ownedUpRef ? ownedUpRef.current[k] : 0) - onBU[k]);
      tot += nb[k];

    if (tot > 0) {
      bagRef.current = nb;

      bagRef.current = refillBag(ownedRef.current);

const findGroup = (cells, idx) => {
  const start = cells[idx];
  const seen = new Set(), ids = new Set(), stack = [idx];
  const push = i => { const r = Math.floor(i/SIZE), c = i%SIZE;
    if (r > 0) stack.push(i-SIZE); if (r < SIZE-1) stack.push(i+SIZE);
    if (c > 0) stack.push(i-1); if (c < SIZE-1) stack.push(i+1); };
  if (start.type === JUNK) { // お邪魔グループ（虹とは繋がらない）
    while (stack.length) {
      const i = stack.pop();
      if (seen.has(i)) continue; seen.add(i);
      if (cells[i].type !== JUNK) continue;
      ids.add(cells[i].id); push(i);
    }
    return ids;
  }
  // 色グループ。虹(wild)はどの色とも繋がるが、異なる実色同士は橋渡ししない（最初の実色を基準色に固定）
  let base = start.wild ? -1 : start.type;
  while (stack.length) {
    const i = stack.pop();
    if (seen.has(i)) continue; seen.add(i);
    const cell = cells[i];
    if (cell.type === JUNK) continue; // お邪魔は繋がらない
    if (!cell.wild) {
      if (base === -1) base = cell.type;
      else if (cell.type !== base) continue;
    }
    ids.add(cell.id); push(i);
  }
  return ids;
};
// プリズム: 盤面の最少色を他の色へ変換して3色にする（ターン開始時のみ）
const prismBoard = cells => {
  const counts = [0, 0, 0, 0];
  for (const c of cells) if (c.type < 4) counts[c.type]++;
  const present = [0, 1, 2, 3].filter(t => counts[t] > 0);
  if (present.length <= 3) return cells;
  let minT = present[0];
  for (const t of present) if (counts[t] < counts[minT]) minT = t;
  const others = present.filter(t => t !== minT);
  return cells.map(c => c.type === minT ? { ...c, id: UID++, type: pick(others) } : c);
};

// 爆弾特殊: グループ内の爆弾が周囲を巻き込む（連鎖爆発はしない）
const expandIds = (cells, ids) => {
  // 爆風に巻き込まれた爆弾も誘爆する（各爆弾は1回だけ起爆）
  const out = new Set(ids);
  const done = new Set();
  const ORTH = [[-1,0],[1,0],[0,-1],[0,1]], DIAG = [[-1,-1],[-1,1],[1,-1],[1,1]];
  let changed = true;
  while (changed) {
    changed = false;
    cells.forEach((c, i) => {
      if (!out.has(c.id) || done.has(c.id)) return;
      if (c.special !== "bombx" && c.special !== "bombd") return;
      done.add(c.id);
      const r = (i / SIZE) | 0, col = i % SIZE;
      const dirs = c.special === "bombx" ? (c.up ? ORTH.concat(DIAG) : ORTH) : (c.up ? DIAG.concat(ORTH) : DIAG);
      for (const d of dirs) {
        const nr = r + d[0], nc = col + d[1];
        if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
        const id2 = cells[nr * SIZE + nc].id;
        if (!out.has(id2)) { out.add(id2); changed = true; }
      }
    });
  }
  return out;
};
const groupInfo = (cells, ids) => {
  const sp = { star:0, plus:0, three:0, pierce:0, bombx:0, bombd:0, aoe:0, gold:0, bolt:0, heal:0, def:0, atk:0, atkx:0, defx:0, store:0 };
  const spu = { star:0, plus:0, three:0, pierce:0, bombx:0, bombd:0, aoe:0, gold:0, bolt:0, heal:0, def:0, atk:0, atkx:0, defx:0, store:0 };
  let junkCnt = 0;
  for (const cell of cells) if (ids.has(cell.id)) {
    if (cell.special && sp[cell.special] !== undefined) { sp[cell.special]++; if (cell.up) spu[cell.special]++; }
    if (cell.type === JUNK) junkCnt++;
  }
  const junk = junkCnt > 0 && junkCnt === ids.size; // 全部お邪魔のときだけ効果ゼロ
  const base = ids.size + sp.plus + spu.plus + spu.pierce + spu.bolt * 3; // ＋/貫＋/雷＋のボーナス込み
  let mult = 1;
  const starOn = sp.star > 0 && base >= Math.max(4, (spu.star > 0 ? 5 : STAR_THRESHOLD) - (hasR("starbook") ? 1 : 0));
  if (starOn) mult *= 1 + sp.star;

const refill = (cells, removeIds, bagRef, ownedRef, bagUpRef, ownedUpRef) => {
  const next = cells.slice();
  const newPositions = [];
  for (let c = 0; c < SIZE; c++) {
    const survivors = [];
    for (let r = 0; r < SIZE; r++) {
      const cell = cells[r*SIZE+c];
      if (!removeIds.has(cell.id)) survivors.push(cell);
    }
    const need = SIZE - survivors.length;
    const col = [];
    for (let k = 0; k < need; k++) col.push(makeDrop(false));
    for (const s of survivors) col.push(s);
    for (let r = 0; r < SIZE; r++) {
      next[r*SIZE+c] = col[r];
      if (r < need) newPositions.push(r*SIZE+c);
    }
  }
  let specials = 0;
  for (const cell of next) if (cell.special) specials++;
  let needSpecial = specialTarget() - specials;
  if (needSpecial > 0) {
    const np = shuffle(newPositions.slice());
    for (let k = 0; k < needSpecial && k < np.length; k++) {
      const d = drawFromBag(bagRef, ownedRef, bagUpRef, ownedUpRef, next);
      next[np[k]] = { ...next[np[k]], special: d.k, up: d.up };
    }
  }
  return { next, newPositions };
};

  // ===== 盤面操作 =====
  const commit = useCallback(idx => {
    if (lockedRef.current) return;
    if (statusRef.current === "puzzle") { puzzleTapRef.current(idx); return; }
    if (statusRef.current !== "battle") return;
    // ガイド付きチュートリアルの盤面入力制限
    if (gtutRef.current === "warn" || gtutRef.current === "def" || gtutRef.current === "done") return;
    if (gtutRef.current === "clear" && !findGroup(boardRef.current, gtutSeedRef.current).has(boardRef.current[idx].id)) return;
    const act = actionRef.current;
    if (!act || usedRef.current.has(act)) return;
    const skill = charSkillRef.current;
    // 色変えキャラ：3つ目のアクションは「タップした1個を現在のインク色へ塗り替える」（消さない）
    if (act === "heal" && skill === "recolor") {
      const cell = boardRef.current[idx];
      if (cell.type === JUNK) { SFX.tap(); return; } // お邪魔は塗れない（アクション消費なし）
      const grp = findGroup(boardRef.current, idx); // つながった同色グループ全体を塗り替える
      const paint = paintColorRef.current;
      let painted = 0;
      const nb = boardRef.current.map(c => {
        if (grp.has(c.id) && c.type !== JUNK && !c.wild) { painted++; return { ...c, id:UID++, type:paint }; }
        return c;
      });
      commitBoard(nb); syncBag();
      SFX.clear();
      addLog([`🎨 つながった${painted}個を${["赤","金","紫","碧","青"][paint] || ""}色に塗り替えた`]);
      const nu = new Set(usedRef.current); nu.add("heal");
      setUsed(nu); usedRef.current = nu;
      if (nu.size >= 3) setTimeout(() => resolveTurn(), FAST ? 60 : 350);
      else { const na = ORDER.find(a => !nu.has(a)); setAction(na); actionRef.current = na; }
      return;
    }
    // 鍛冶キャラ：生成＝袋の特殊ドロップを素材の数だけタップしたグループへ打ち出す／
    // 強化＝グループ内の特殊ドロップを素材の数だけ＋に鍛える（どちらも消さない）
    if (act === "heal" && skill === "smith" && smithModeRef.current !== "stock") {
      const cell = boardRef.current[idx];
      if (cell.type === JUNK) { SFX.tap(); return; } // お邪魔は鍛えられない（アクション消費なし）
      const grp = findGroup(boardRef.current, idx);
      const mode = smithModeRef.current;
      const nb = boardRef.current.slice();
      let done = 0;
      if (mode === "gen") {
        const target = boardRef.current.map((c, i) => (grp.has(c.id) && c.type !== JUNK && !c.wild && !c.special) ? i : -1).filter(i => i >= 0);
        // 生成できる上限＝「所持しているが盤面に出ていない」特殊数（袋の枯渇による複製を防ぐ）
        const onBoard = boardRef.current.filter(c => c.special).length;
        const avail = ITEM_KEYS.reduce((s, k) => s + ownedRef.current[k], 0) - onBoard;
        const n = Math.min(stockRef.current, target.length, Math.max(0, avail));
        for (let t = 0; t < n; t++) {
          const d = drawFromBag(bagRef, ownedRef, bagUpRef, ownedUpRef, nb);
          nb[target[t]] = { ...nb[target[t]], special: d.k, up: d.up };
          done++;
        }
        if (done) addLog([`⚒ 素材${done}を打ち、特殊ドロップ${done}個を生成した`]);
      } else {
        const target = boardRef.current.map((c, i) => (grp.has(c.id) && c.special && !c.up) ? i : -1).filter(i => i >= 0);
        const n = Math.min(stockRef.current, target.length);
        for (let t = 0; t < n; t++) { nb[target[t]] = { ...nb[target[t]], up: true }; done++; }
        if (done) addLog([`⚒ 特殊ドロップ${done}個を＋に鍛えた`]);
      }
      if (!done) { SFX.tap(); return; } // 素材不足・対象なしはアクション消費なし
      stockRef.current -= done; setStockView(stockRef.current);
      commitBoard(nb); syncBag();
      SFX.forge();
      const nu = new Set(usedRef.current); nu.add("heal");
      setUsed(nu); usedRef.current = nu;
      if (nu.size >= 3) setTimeout(() => resolveTurn(), FAST ? 60 : 350);
      else { const na = ORDER.find(a => !nu.has(a)); setAction(na); actionRef.current = na; }
      return;
    }
    const { ids, seedJunk, blast, cross, red } = expandClear(boardRef.current, idx, !turnRef.current.blastUsed, !turnRef.current.crossUsed);
    if (blast) turnRef.current.blastUsed = true;
    if (cross) turnRef.current.crossUsed = true; // 十字晶は1ターン1回
    const info = groupInfo(boardRef.current, ids);
    const eff = computeEffect(act, info);
    const pureCount = findGroup(boardRef.current, idx).size; // 「同じ色を◯個」の判定は素の同色グループ数で
    const { next, newPositions } = refill(boardRef.current, ids, bagRef, ownedRef, bagUpRef, ownedUpRef);
    // レリック生成の虹（ワイルド）特殊。消した位置(新規落下)へ置く
    const genKinds = [];
    if (hasR("linegem") && pureCount >= 5) genKinds.push("linev");
    if (hasR("linegemh") && pureCount >= 5) genKinds.push("lineh");
    if (hasR("gachagem") && pureCount >= 6) {
      const ownedSp = REWARD_KEYS.filter(k => ownedRef.current[k] > 0);
      if (ownedSp.length) genKinds.push(pick(ownedSp));
    }
    if (genKinds.length) {
      const freePos = shuffle(newPositions.slice());
      genKinds.forEach((k, gi) => { if (gi < freePos.length) next[freePos[gi]] = { ...next[freePos[gi]], special: k, up: false, wild: true }; });
      addLog(["🌈 虹ドロップが生まれた！"]);
    }
    // 盤面の特殊ドロップ数を指定数(specialTarget)に収める。生成した虹を優先して残し、
    // 超過分は通常特殊を間引く＝虹生成しても盤面の特殊が指定数以上に増え続けない
    {
      const cap = specialTarget();
      let curSp = 0; const normPos = [];
      for (let i = 0; i < next.length; i++) { if (next[i].special) { curSp++; if (!next[i].wild) normPos.push(i); } }
      if (curSp > cap) {
        const rm = shuffle(normPos);
        for (let k = 0; k < rm.length && curSp > cap; k++) { next[rm[k]] = { ...next[rm[k]], special: false, up: false }; curSp--; }
      }
    }
    let mainAdd = eff.main;
    if (act === "atk" && turnRef.current.atkBoost) mainAdd *= 2;
    if (act === "def" && turnRef.current.defBoost) mainAdd *= 2;
    if (act === "heal" && skill === "buff") {
      // 強化キャラ：3つ目で消すと、選んだステータスを「1ドロップにつき◯倍」で累積強化
      const st = skillTargetRef.current;
      const inc = hasR("warforge2") ? 0.4 : hasR("warforge") ? 0.3 : 0.2;
      const factor = 1 + inc * info.count; // 1ドロップにつき+inc の加算式（5個・+0.2 → 2.0倍）
      turnRef.current[st] = Math.round(turnRef.current[st] * factor);
      addLog([`✨ ${st === "atk" ? "攻撃" : "防御"}を強化！ +${inc}×${info.count}個 → ×${factor.toFixed(1)}`]);
    } else if (act === "heal" && skill === "store") {
      // 蓄積キャラ：消した数を累積し、選んだステータスへ加算（累積はバトルごとにリセット）
      const st = skillTargetRef.current;
      const sinc = hasR("storegem") ? 2 : 1; // ノア専用レリックで1ドロップ＝蓄積+2
      storeRef.current += info.count * sinc;
      setStoreView(storeRef.current);
      turnRef.current[st] += storeRef.current;
      addLog([`📚 蓄積 ${storeRef.current}（${st === "atk" ? "攻撃" : "防御"}へ加算）`]);
    } else if (act === "heal" && skill === "smith") {
      // 鍛冶キャラ・補充：消した数だけ素材を貯める（回復はしない）
      stockRef.current += info.count;
      setStockView(stockRef.current);
      addLog([`📦 素材 +${info.count}（計 ${stockRef.current}）`]);
    } else {
      turnRef.current[act] += mainAdd;
    }
    if (eff.splitAtk) turnRef.current.atk += eff.splitAtk;
    if (eff.splitDef) turnRef.current.def += eff.splitDef;
    if (eff.healBonus) turnRef.current.heal += eff.healBonus;
    if (info.sp.pierce > 0) turnRef.current.pierce = true;
    if (act === "atk" && info.sp.aoe > 0) {
      turnRef.current.aoe = true;
      if (info.spu.aoe > 0) turnRef.current.aoeUp = true;
    }
    // 蓄積石：攻撃/防御で消しても蓄積が貯まる（蓄積スロットで消した分はinfo.countに含むので二重加算を避ける）
    if (skill === "store" && act !== "heal" && info.sp.store > 0) {
      const add = info.sp.store + info.spu.store; // 強化済みは+2
      storeRef.current += add;
      setStoreView(storeRef.current);
      addLog([`📚 蓄積石 +${add}（蓄積 ${storeRef.current}）`]);
    }
    if (info.sp.gold > 0) {
      const g = (info.sp.gold - info.spu.gold) * 5 + info.spu.gold * 12;
      setCoinsBoth(coinsRef.current + g);
      SFX.coin();
      addLog([`金 コイン+${g}`]);
    }
    syncTurn();
    if (info.junk) SFX.tap();
    else SFX.clear();
    const ll = [];
    if (info.sp.bombx || info.sp.bombd) ll.push(`💥 爆発！計${info.count}個を消した`);
    if (info.starOn) ll.push(`★ ${info.base}個消し ${info.mult}倍`);
    else if (info.threeOn) ll.push("3 ちょうど3個 3倍");
    if (eff.splitAtk) ll.push(`剣 攻撃+${eff.splitAtk}`);
    if (eff.splitDef) ll.push(`盾 防御+${eff.splitDef}`);
    if (eff.healBonus) ll.push(`♥ 回復+${eff.healBonus}`);
    if (info.sp.pierce > 0) ll.push("貫 攻撃が貫通化！");
    if (act === "atk" && info.sp.aoe > 0) ll.push("全 攻撃が全体化！");
    if (info.sp.bolt > 0) ll.push("雷 同色を全消し！");
    if (ll.length) addLog([ll.join(" / ")]);
    const newUsed = new Set(usedRef.current);
    newUsed.add(act);
    setUsed(newUsed); usedRef.current = newUsed;
    // ==== 消去演出（盤面が消える前に座標を取る）====
    // 通常範囲(素の同色グループ)を先に消す → 特殊エフェクト → 追加分を消す
    const baseIds = findGroup(boardRef.current, idx);
    const hasExtra = ids.size > baseIds.size;
    const clearedIdxs = [], bombIdxs = [];
    boardRef.current.forEach((c, i) => {
      if (!ids.has(c.id)) return;
      clearedIdxs.push(i);
      if (c.special === "bombx" || c.special === "bombd") bombIdxs.push(i);
    });
    const linevCols = [...new Set(boardRef.current.map((c, i) => (ids.has(c.id) && c.special === "linev") ? (i % SIZE) : -1).filter(x => x >= 0))];
    const linehRows = [...new Set(boardRef.current.map((c, i) => (ids.has(c.id) && c.special === "lineh") ? ((i / SIZE) | 0) : -1).filter(x => x >= 0))];
    const boltExtra = boardRef.current.map((c, i) => (ids.has(c.id) && !baseIds.has(c.id) && info.sp.bolt > 0) ? i : -1).filter(i => i >= 0);
    const r0 = Math.floor(idx / SIZE), c0 = idx % SIZE;
    const xgTrig = hasR("xgem") && baseIds.size === 5 && hasExtra;
    const playEffects = () => {
      const explode = bombIdxs.slice();
      if (blast) explode.push(idx);
      // X字晶(xgem): タップ位置から斜め4方向のセルすべてを爆破し、X字状の爆発に
      if (xgTrig) {
        for (let d = 1; d < SIZE; d++) {
          [[r0 + d, c0 + d], [r0 + d, c0 - d], [r0 - d, c0 + d], [r0 - d, c0 - d]].forEach(rc => {
            if (rc[0] >= 0 && rc[0] < SIZE && rc[1] >= 0 && rc[1] < SIZE) explode.push(rc[0] * SIZE + rc[1]);
          });
        }
        explode.push(idx);
      }
      if (explode.length) boomAt(explode);
      let sweptLine = false;
      // 縦裂(linev)/横薙(lineh): 1列消しを棒状の爆破で表現
      linevCols.forEach(c => { barBlast("v", colCells(c)); sweptLine = true; });
      linehRows.forEach(r => { barBlast("h", rowCells(r)); sweptLine = true; });
      // 十字晶(cross): 縦バー＋横バー＋中心の爆発でクロス状の爆破に
      if (cross) { barBlast("v", colCells(c0)); barBlast("h", rowCells(r0)); boomAt([idx]); sweptLine = true; }
      // 紅蓮の核(redcore): 消した各赤の上下を、縦の棒状爆破で見せる
      if (red && red.length) {
        const N2 = SIZE * SIZE;
        red.forEach(i => barBlast("v", [i - SIZE, i, i + SIZE].filter(k => k >= 0 && k < N2 && (k % SIZE) === (i % SIZE))));
        SFX.crack(); setShakeSeq(q => q + 1);
      }
      if (sweptLine) SFX.swish();
      if (boltExtra.length) lightningAt(boltExtra);
    };
    const finishClear = () => {
      commitBoard(next);
      setClearing(new Set());
      syncBag();
      if (gtutRef.current === "clear") { setGuide("done"); } // 5+グループを防御で消したら締めテキストへ
      if (newUsed.size >= 3) {
        setTimeout(() => resolveTurn(), FAST ? 60 : 350);
      } else {
        const nextAct = ORDER.find(a => !newUsed.has(a));
        setAction(nextAct); actionRef.current = nextAct;
        setLocked(false); lockedRef.current = false;
      }
    };
    setLocked(true); lockedRef.current = true;
    if (!hasExtra) {
      // 特殊拡張なし → 従来どおり一括で消す
      if (bombIdxs.length) boomAt(bombIdxs);
      if (!info.junk) flyParticles(clearedIdxs, act);
      setClearing(new Set(ids));
      setTimeout(finishClear, FAST ? 40 : 240);
    } else {
      // 段階演出: 通常範囲を消す → エフェクト → 追加分を消す
      setClearing(new Set(baseIds));
      setTimeout(() => {
        playEffects();
        setTimeout(() => {
          setClearing(new Set(ids));
          if (!info.junk) flyParticles(clearedIdxs, act);
          setTimeout(finishClear, FAST ? 30 : 220);
        }, FAST ? 20 : 300);
      }, FAST ? 20 : 190);
    }
  }, [resolveTurn]);
  commitRef.current = commit;

  // 爆発バースト（爆弾セルの位置に）
  const boomAt = idxs => {
    try {
      idxs.forEach(i => {
        const el = document.querySelector(`[data-idx="${i}"]`);
        if (!el) return;
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        const mk = (cls, life) => {
          const d = document.createElement("div");
          d.className = cls;
          d.style.left = cx + "px";
          d.style.top = cy + "px";
          document.body.appendChild(d);
          setTimeout(() => d.remove(), life);
          return d;
        };
        mk("boom-ring", 640);   // 拡散する衝撃波リング
        mk("boom-fx", 560);     // 中心の閃光
        const N = 8;            // 飛び散る火花
        for (let s = 0; s < N; s++) {
          const ang = (Math.PI * 2 * s) / N + Math.random() * 0.5;
          const dist = 34 + Math.random() * 26;
          const sp = mk("boom-spark", 540);
          sp.style.setProperty("--dx", Math.cos(ang) * dist + "px");
          sp.style.setProperty("--dy", Math.sin(ang) * dist + "px");
        }
      });
      if (idxs.length) { SFX.crack(); setShakeSeq(q => q + 1); }
    } catch (e) {}
  };
  // 列/行のセル群
  const colCells = c => Array.from({ length: SIZE }, (_, r) => r * SIZE + c);
  const rowCells = r => Array.from({ length: SIZE }, (_, c) => r * SIZE + c);
  // 列消し系: 行/列に沿って光の線が走る演出
  const lineSweep = (kind, cellIdxs) => {
    try {
      const rects = cellIdxs.map(i => document.querySelector(`[data-idx="${i}"]`)).filter(Boolean).map(e => e.getBoundingClientRect());
      if (!rects.length) return;
      const left = Math.min(...rects.map(r => r.left)), right = Math.max(...rects.map(r => r.right));
      const top = Math.min(...rects.map(r => r.top)), bottom = Math.max(...rects.map(r => r.bottom));
      const d = document.createElement("div");
      d.className = kind === "v" ? "line-fx-v" : "line-fx-h";
      d.style.left = left + "px"; d.style.top = top + "px";
      d.style.width = (right - left) + "px"; d.style.height = (bottom - top) + "px";
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 440);
    } catch (e) {}
  };
  // ライン/十字消しの「棒状の爆破」演出（cellIdxs の範囲に炎のバーを出す）
  const barBlast = (kind, cellIdxs) => {
    try {
      const rects = cellIdxs.map(i => document.querySelector(`[data-idx="${i}"]`)).filter(Boolean).map(e => e.getBoundingClientRect());
      if (!rects.length) return;
      const left = Math.min(...rects.map(r => r.left)), right = Math.max(...rects.map(r => r.right));
      const top = Math.min(...rects.map(r => r.top)), bottom = Math.max(...rects.map(r => r.bottom));
      const d = document.createElement("div");
      d.className = kind === "v" ? "bar-fx-v" : "bar-fx-h";
      d.style.left = left + "px"; d.style.top = top + "px";
      d.style.width = (right - left) + "px"; d.style.height = (bottom - top) + "px";
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 560);
    } catch (e) {}
  };
  // サンダー: 対象セルが電撃で弾ける演出
  const lightningAt = idxs => {
    try {
      idxs.forEach(i => {
        const el = document.querySelector(`[data-idx="${i}"]`); if (!el) return;
        const r = el.getBoundingClientRect();
        const d = document.createElement("div"); d.className = "bolt-fx";
        d.style.left = r.left + "px"; d.style.top = r.top + "px";
        d.style.width = r.width + "px"; d.style.height = r.height + "px";
        document.body.appendChild(d); setTimeout(() => d.remove(), 420);
      });
      if (idxs.length) { SFX.zap(); setFlashSeq(q => q + 1); }
    } catch (e) {}
  };
  // 消したドロップからアクション数値へ粒子が飛ぶ
  const flyParticles = (idxs, key) => {
    try {
      const target = document.getElementById("actval-" + key);
      if (!target) return;
      const tr = target.getBoundingClientRect();
      const tx = tr.left + tr.width / 2, ty = tr.top + tr.height / 2;
      idxs.slice(0, 14).forEach((i, j) => {
        const el = document.querySelector(`[data-idx="${i}"]`);
        if (!el) return;
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        const d = document.createElement("div");
        d.className = "fly-dot";
        d.style.left = cx + "px";
        d.style.top = cy + "px";
        d.style.background = ACTIONS[key].color;
        d.style.transitionDelay = (j * 16) + "ms";
        document.body.appendChild(d);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          d.style.transform = `translate(${tx - cx}px, ${ty - cy}px) scale(.45)`;
          d.style.opacity = "0.2";
        }));
        setTimeout(() => d.remove(), 760 + j * 16);
      });
    } catch (e) {}
  };

  const cellAt = (x, y) => {
    const el = document.elementFromPoint(x, y);
    const b = el && el.closest ? el.closest("[data-idx]") : null;
    return b ? parseInt(b.getAttribute("data-idx"), 10) : null;
  };
  const makePreview = (b, idx) => {
    // 宝箱パズルはレリックの消し方拡張を無効化（プレーンな同色グループのみ）＝実消去(puzzleTap)と一致
    if (statusRef.current === "puzzle") { const ids = findGroup(b, idx); return { ids, over:true, info: groupInfo(b, ids) }; }
    // 色変え／鍛冶(生成・強化)の3つ目アクションは「つながった同色グループ全体」を対象にする（消さない）
    if (statusRef.current === "battle" && actionRef.current === "heal" &&
        (charSkillRef.current === "recolor" || (charSkillRef.current === "smith" && smithModeRef.current !== "stock"))) {
      const grp = findGroup(b, idx); return { ids:grp, over:true, info: groupInfo(b, grp) };
    }
    const { ids } = expandClear(b, idx, !turnRef.current.blastUsed, !turnRef.current.crossUsed);
    return { ids, over:true, info: groupInfo(b, ids) };
  };
  useEffect(() => {
    const move = e => {
      if (!pressingRef.current) return;
      const idx = cellAt(e.clientX, e.clientY);
      if (idx == null) setPreview({ ids:new Set(), over:false, info:null });
      else {
        const cellId = boardRef.current[idx].id;
        if (startGroupRef.current && startGroupRef.current.has(cellId)) setPreview(makePreview(boardRef.current, idx));
        else setPreview({ ids:new Set(), over:false, info:null });
      }
    };
    const up = e => {
      if (!pressingRef.current) return;
      pressingRef.current = false;
      const idx = cellAt(e.clientX, e.clientY);
      setPreview(null);
      if (idx != null) {
        const releaseId = boardRef.current[idx].id;
        if (startGroupRef.current && startGroupRef.current.has(releaseId)) commitRef.current(idx);
      }
      startGroupRef.current = null;
    };
    window.addEventListener("pointermove", move, { passive:false });
    window.addEventListener("pointerup", up);
    window.addEventListener("pointercancel", up);
    return () => {
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
      window.removeEventListener("pointercancel", up);
    };
  }, []);
  const onDown = (e, idx) => {
    if (lockedRef.current || (statusRef.current !== "battle" && statusRef.current !== "puzzle")) return;

        h("span", { className:"font-bold", style:{ color:"#e8c06a" } }, "ターン ", turn),
        h("span", { className:"flex items-center gap-1" }, "残り",
          Array.from({ length:3 }).map((_,i) => h("span", { key:i, className:"inline-block rounded-full", style:{ width:9, height:9, background: i < remaining ? "#d8a848" : "rgba(255,255,255,.18)" } }))),
        h("span", { className:"flex gap-1 items-center" },
          tv.pierce && h("span", { className:"text-[9px] font-bold rounded-lg", style:{ color:"#f06aae", border:"1px solid #f06aae", padding:"1px 4px" } }, "貫通"),
          tv.aoe && h("span", { className:"text-[9px] font-bold rounded-lg", style:{ color:"#ff9a3c", border:"1px solid #ff9a3c", padding:"1px 4px" } }, "全体"),
          tv.atkBoost && h("span", { className:"text-[9px] font-bold rounded-lg", style:{ color:"#e05a50", border:"1px solid #e05a50", padding:"1px 4px" } }, "攻2倍"),
          tv.defBoost && h("span", { className:"text-[9px] font-bold rounded-lg", style:{ color:"#5a8fd0", border:"1px solid #5a8fd0", padding:"1px 4px" } }, "防2倍"),
          tv.stun && h("span", { className:"text-[9px] font-bold rounded-lg", style:{ color:"#c9a2ff", border:"1px solid #c9a2ff", padding:"1px 4px" } }, "時止め"),
          h("span", { className:"flex items-center", style:{ color:"#ff8a80", ...numCell, gap:2, justifyContent:"flex-end" } },
            h("img", { src:"assets/icon_atk.png", alt:"攻", draggable:false, width:13, height:13, style:{ width:13, height:13, maxWidth:13, maxHeight:13, flexShrink:0, objectFit:"contain" } }), dispTv.atk),
          h("span", { className:"flex items-center", style:{ color:"#9db8e8", ...numCell, gap:2, justifyContent:"flex-end" } },
            h("img", { src:"assets/icon_def.png", alt:"防", draggable:false, width:13, height:13, style:{ width:13, height:13, maxWidth:13, maxHeight:13, flexShrink:0, objectFit:"contain" } }), dispTv.def),
          h("span", { className:"flex items-center", style:{ color:"#8ce8b0", ...numCell, gap:2, justifyContent:"flex-end" } },
            h("img", { src:"assets/icon_heal.png", alt:"回", draggable:false, width:13, height:13, style:{ width:13, height:13, maxWidth:13, maxHeight:13, flexShrink:0, objectFit:"contain" } }), dispTv.heal))),
      h("div", { className:"flex items-center justify-between mb-1", style:{ opacity: gActive ? 0.34 : 1, transition:"opacity .3s ease", pointerEvents: gActive ? "none" : "auto" } },
        h("div", { className:"flex items-center gap-1.5" }, itemSlots(38)),
        h("div", { className:"flex items-center", style:{ fontSize:11, gap:4 } },
          h("span", { style:{ opacity:0.75 } }, "被ダメ予測"),
          h("b", { style:{ color: incomingPreview > 0 ? "#ff8a80" : "#7cffb0", fontSize:15, fontVariantNumeric:"tabular-nums", textShadow:"0 1px 2px #000" } }, incomingPreview),
          tv.def > 0 && h("span", { className:"flex items-center", style:{ gap:2, fontSize:10, color:"#9db8e8" } },
            "（", h("img", { src:"assets/icon_def.png", alt:"", draggable:false, width:11, height:11, style:{ width:11, height:11, maxWidth:11, maxHeight:11, flexShrink:0, objectFit:"contain" } }), tv.def, "）"))),
      // アクション
      h("div", { className:"grid grid-cols-3 gap-2 mb-1" }, ORDER.map(key => {
        const curSkill = CHARS[curChar].skill;
        // 3つ目のアクションがキャラ固有スキル（色変え/強化/蓄積）の場合は専用ボタン
        if (key === "heal" && (curSkill === "recolor" || curSkill === "buff" || curSkill === "store" || curSkill === "smith")) {
          const sc = CHARS[curChar].color;
          const isUsed = used.has("heal");
          const isSel = action === "heal" && !isUsed;
          const tgtLabel = skillTarget === "atk" ? "攻" : "防";
          let title, glyph, valEl, iconEl;
          if (curSkill === "recolor") {
            title = "色変え";
            iconEl = h("span", { style:{ width:18, height:18, marginTop:5, borderRadius:5, border:"2px solid rgba(255,255,255,.85)", background:`linear-gradient(180deg,${DROPS[paintColor].c1},${DROPS[paintColor].c2})`, flexShrink:0 } });
            valEl = h("span", { style:{ fontSize:"0.72rem", fontWeight:800 } }, "インク");
          } else if (curSkill === "smith") {
            title = smithMode === "stock" ? "補充" : smithMode === "gen" ? "生成" : "強化＋";
            iconEl = h("span", { style:{ fontSize:16, marginTop:5, lineHeight:1 } }, smithMode === "stock" ? "📦" : smithMode === "gen" ? "✨" : "⚒️");
            valEl = h("span", { style:{ fontSize:"0.9rem", fontWeight:900 } }, "素材", stockView);
          } else if (curSkill === "buff") {
            const inc = hasR("warforge2") ? "0.4" : hasR("warforge") ? "0.3" : "0.2";
            title = "強化→" + tgtLabel;
            iconEl = h("span", { style:{ fontSize:16, marginTop:5, lineHeight:1 } }, "💪");
            valEl = h("span", { style:{ fontSize:"0.9rem", fontWeight:900 } }, "+" + inc + "/個");
          } else {
            title = "蓄積→" + tgtLabel;
            iconEl = h("span", { style:{ fontSize:16, marginTop:5, lineHeight:1 } }, "📚");
            valEl = h("span", { style:{ fontSize:"1rem", fontWeight:900 } }, "+" + storeView);
          }
          return h("button", { key,
            onClick: () => {
              if (isUsed || locked) return;
              if (!isSel) { setAction("heal"); actionRef.current = "heal"; SFX.tap(); return; }
              if (curSkill === "recolor") { setPaintColor((paintColor + 1) % 4); SFX.tap(); }
              else if (curSkill === "smith") { setSmithMode(smithMode === "stock" ? "gen" : smithMode === "gen" ? "up" : "stock"); SFX.tap(); }
              else { setSkillTarget(skillTarget === "atk" ? "def" : "atk"); SFX.tap(); }
            }, disabled:isUsed,
            className:"act-h relative rounded-xl flex flex-col items-center justify-center overflow-hidden",
            style:{ background: isUsed ? "rgba(14,11,20,.85)" : isSel ? "rgba(255,255,255,.06)" : "rgba(30,24,42,.92)",
              border:`2px solid ${isUsed ? "#2c2740" : isSel ? sc : "#3c3450"}`,
              opacity: isUsed ? 0.4 : 1, transition:"background .25s ease, border-color .25s ease, opacity .25s ease" } },
            h("span", { style:{ position:"absolute", top:0, left:"14%", right:"14%", height:3, borderRadius:"0 0 4px 4px", background:sc, opacity: isUsed ? 0.25 : 0.9, pointerEvents:"none" } }),
            iconEl,
            h("span", { style:{ fontSize:11, height:15, lineHeight:"15px", whiteSpace:"nowrap", color: isUsed ? "#777" : "#e7e0ef" } }, title),
            h("span", { style:{ fontSize:"1.05rem", height:20, lineHeight:"20px", display:"flex", alignItems:"center", justifyContent:"center", color: isUsed ? sc : "#e0d8f0" } }, valEl));
        }
        const a = ACTIONS[key];
        const isUsed = used.has(key);
        const isSel = action === key && !isUsed;
        const crossBonus = !isSel && selEff ? (key === "atk" ? selEff.splitAtk : key === "def" ? selEff.splitDef : selEff.healBonus) : 0;
        const mkBreakdown = (total, base, bonus, tc) => h("span", { style:{ display:"flex", alignItems:"baseline", gap:2, justifyContent:"center" } },
          h("span", { style:{ fontSize:"1.15rem", color:tc, fontWeight:900, textShadow:`0 0 8px ${tc}` } }, total),
          h("span", { style:{ fontSize:"0.58rem", opacity:0.6 } }, `(${base}+${bonus})`));
        let valEl;
        if (isSel && selEff) {
          let v = selEff.main;
          if (key === "atk") v += selEff.splitAtk;
          if (key === "def") v += selEff.splitDef;
          if (key === "heal") v += selEff.healBonus;
          const base = dispTv[key];
          valEl = base > 0 ? mkBreakdown(base + v, base, v, info && info.mult > 1 ? "#ffe88a" : "#fff") : `+${v}`;
        } else if (crossBonus > 0) {
          const base = dispTv[key];
          valEl = base > 0 ? mkBreakdown(base + crossBonus, base, crossBonus, "#ffcf5d") : `+${crossBonus}`;
        } else valEl = String(dispTv[key]);
        const lit = fx.length > 0 && fx[fx.length-1].act === key;
        const gWarn = gtut === "warn", gDef = gtut === "def", gClear = gtut === "clear";
        const guideTgt = gDef && key === "def";        // 「防御」を光らせて誘導
        const guideOff = gWarn || (gDef && key !== "def") || gClear; // 誘導中の対象外ボタンは暗く
        const disabledBtn = isUsed || gWarn || gClear || (gDef && key !== "def");
        return h("button", { key,
          onClick: () => {
            if (isUsed || locked) return;
            if (gWarn) return;
            if (gDef) { if (key === "def") { setAction("def"); actionRef.current = "def"; SFX.tap(); setGuide("clear"); } return; }
            if (gClear) return;
            setAction(key); SFX.tap();
          }, disabled:disabledBtn,
          className:"act-h relative rounded-xl flex flex-col items-center justify-center overflow-hidden",


          style:{
            background: isUsed ? (lit ? a.bg : "rgba(14,11,20,.85)") : (isSel || guideTgt) ? a.bg : "rgba(30,24,42,.92)",
            border: `2px solid ${isUsed ? (lit ? a.color : "#2c2740") : (isSel || guideTgt) ? a.color : "#3c3450"}`,
            boxShadow: guideTgt ? `0 0 0 3px ${a.color}, 0 0 18px ${a.color}` : lit ? `0 0 0 3px ${a.color}` : "none",
            animation: lit ? "actPulse .55s ease" : "none",
            opacity: guideOff ? 0.26 : isUsed ? (lit ? 1 : 0.4) : 1,
            zIndex: guideTgt ? 46 : "auto",
            transition:"background .25s ease, border-color .25s ease, box-shadow .25s ease, opacity .25s ease" } },
          h("span", { style:{ position:"absolute", top:0, left:"14%", right:"14%", height:3, borderRadius:"0 0 4px 4px", background:a.color, opacity: isUsed && !lit ? 0.25 : 0.9, pointerEvents:"none" } }),
          h("img", { src:a.img, alt:a.label, draggable:false, width:20, height:20, style:{ height:20, width:20, maxWidth:20, maxHeight:20, flexShrink:0, marginTop:5, objectFit:"contain", opacity: isUsed && !lit ? 0.35 : 1, filter:"drop-shadow(0 2px 1px rgba(0,0,0,.45))" } }),
          h("span", { style:{ fontSize:11, height:15, lineHeight:"15px", whiteSpace:"nowrap", color: isUsed ? (lit ? "#e7e0ef" : "#777") : "#e7e0ef" } }, a.label,
            h("span", { style:{ fontSize:8, opacity:0.5, marginLeft:2 } }, "×", perOf(key))),
          h("span", { id:"actval-" + key, key:"v" + key + "_" + tv[key], className: tv[key] > 0 ? "val-pulse" : "",
            style:{ fontSize:"1.05rem", height:20, lineHeight:"20px", fontWeight:700, fontVariantNumeric:"tabular-nums", display:"flex", alignItems:"center", justifyContent:"center",
            color: lit ? "#ffffff" : isSel && selEff && tv[key] === 0 ? (info && info.mult > 1 ? "#ffe88a" : "#fff") : crossBonus > 0 && tv[key] === 0 ? "#ffcf5d" : isUsed ? a.color : tv[key] > 0 ? "#e0d8f0" : "#9b93a6",
            textShadow: isSel && selEff && tv[key] === 0 && info && info.mult > 1 ? "0 0 8px #ffd54a" : "none" } }, valEl));
      })),
      // 盤面
      boardEl,
      overlays));
}

  var root = RD.createRoot(document.getElementById('root'));
  root.render(h(DropBattle));
})();
</script>
</body>
</html>

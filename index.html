(function(){

  if(!R || !RD){ document.getElementById('root').innerHTML = '<p style="color:#fff;padding:20px">読み込みに失敗しました。通信環境を確認して再読み込みしてください。</p>'; return; }

// ===== 基本設定 =====
const SIZE = 6;
const TOTAL = SIZE * SIZE;
const P_MAX = 300;
const NUM_SPECIAL = 5;
const STAR_THRESHOLD = 6;
const ATK_PER = 10, DEF_PER = 10, HEAL_PER = 1;
// 賭博師の「賭け」: 消した数が賭け金（HP）と見返りの両方を決める。
//   払うHP = GAMBLE_COST[モード] × 消した数（天使の羽根で最終額を半減・切り上げ）

// 敵の次の行動。仲間がいないヒーラーは攻撃に切り替わる
// なかま回復→攻撃への切り替え判定用: ターン開始時点の「味方が生きていたか」スナップショット（敵id→bool）。
// 敵オブジェクトに持たせると演出のsetTimeout内のsetEnemiesBoth(旧snap)で巻き戻るため、モジュール変数で持つ
let HAD_ALLIES = {};
const intentOf = (en, allies, step = 0) => {
  // step: パターンの何手先を見るか（0=今の行動。激昂の2回行動の予測はstep=1で2手目を見る）
  const k = KINDS[en.kind];
  const pat = en.pat || k.pats[0];
  let act = pat[(en.pi + step) % pat.length];
  const aliveAllies = (allies || []).some(a => a.alive && a.id !== en.id);
  // ターン中に味方が倒れても予告した行動は変わらない（回復対象がいなければ様子見になる）
  const healAllies = HAD_ALLIES[en.id] !== undefined ? HAD_ALLIES[en.id] : aliveAllies;
  if (act === "healally" && !healAllies) act = "attack";
  // 取り巻きが全滅すると火力アップ（裏5章ボス・真魔王ヴァルガ）
  const solo = (en.soloUp && !aliveAllies) ? en.soloUp : 1;
  const roll = (en.rollMul || 1) * solo; // 1行動ごとに振り直されるダメージロール
  let hit = act === "double" ? Math.max(1, Math.round(en.atk * 0.6 * roll)) : Math.max(1, Math.round(en.atk * roll));
  if (en.atkFloor && act !== "double") hit = Math.max(hit, en.atkFloor); // 弱エリートの通常攻撃下限
  let dmg = act === "attack" || act === "drain" || act === "jamatk" ? hit
    : act === "double" ? hit * 2
    : act === "bigatk" ? Math.max(1, Math.round(en.atk * (en.boss ? (k.bigMul || 2) : Math.min(k.bigMul || 2, 2.4)) * (en.bigX || 1) * roll)) : 0;
  if (act === "bigatk" && en.bigFloor) dmg = Math.max(dmg, en.bigFloor); // 弱エリートの溜め攻撃下限
  // jamatk（攻撃と同時に汚染）は単発の jam より汚染数を1つ減らす。
  // 予告バッジもこの値を出すので、表示と実際の汚染数が食い違わない
  const jamBase = Math.max(1, (k.jamN || 3) - (hasR("salt") ? 1 : 0));
  return { act, dmg, hit, hits: act === "double" ? 2 : 1,
    jamN: act === "jamatk" ? Math.max(1, jamBase - 1) : jamBase, heal: Math.round(en.atk * (k.healMul || 1.5)) };
};

  for (let r = 0; r < ROWS; r++) {
    let types;
    if (r === 0) types = ["battle"]; // 1層目は分岐なし（出発は常に1択）
    else if (r === 1 && simpleStart) types = ["battle","battle"];
    else if (r === ROWS-1) types = ["boss"];
    else if (r === ROWS-2) {
      // ボス直前の段：立て直せる枠（休憩か宝箱）を必ず1つ残しつつ、残りは他の段と同じく色々出す
      const n = 2 + (Math.random() < 0.4 ? 1 : 0);
      types = [Math.random() < 0.65 ? "rest" : "treasure"];
      const others = shuffle(["elite","horde","battle","treasure","rest"].filter(t => t !== types[0]));
      while (types.length < n) types.push(others.pop());
      shuffle(types);
    }
    else {
      const n = 2 + (Math.random() < 0.55 ? 1 : 0);
      // 同じ行に同じ種類を並べない（選択肢は必ず全部違うものにする）
      const roll = () => { const x = Math.random(); return x<0.40?"battle":x<0.60?"horde":x<0.74?"elite":x<0.88?"treasure":"rest"; };
      types = [];
      while (types.length < n) {
        let t = null;
        for (let k = 0; k < 16 && !t; k++) { const c = roll(); if (!types.includes(c)) t = c; }
        if (!t) t = shuffle(["battle","horde","elite","treasure","rest"].filter(a => !types.includes(a)))[0];
        types.push(t);
      }
      if (!types.some(t => t==="battle"||t==="horde")) types[0] = "battle"; // 戦闘が1つも無い行は作らない
      shuffle(types); // 抽選順の偏りを消して左右の並びをランダムに
    }
    rows.push(types.map((t,c) => ({ id:id++, row:r, col:c, n:types.length, type:t })));
  }
  const edges = [];
  for (let r = 0; r < ROWS-1; r++) {
    const a = rows[r], b = rows[r+1];
    const n0 = a.length, n1 = b.length;
    a.forEach((na,i) => {
      const js = Math.floor(i*n1/n0), je = Math.floor(((i+1)*n1-1)/n0);
      for (let j=js; j<=je; j++) edges.push({ from:na.id, to:b[j].id });
      if (n0===n1 && i+1<n1) edges.push({ from:na.id, to:b[i+1].id });
    });
  }
  // ===== 強敵(elite)の配置制約: 1章あたり最大3つ / 詰み禁止 / 1ルート最大2つ =====
  // カード選択UI（次の2〜3択のみ見える1手先読み）を前提に、
  // 「見えている選択肢が全部強敵」という事故だけ機械的に潰す（連戦は許容する）。
  const nodes = rows.flat();
  const byId = new Map(nodes.map(n => [n.id, n]));
  const succ = new Map(nodes.map(n => [n.id, []]));
  edges.forEach(e => succ.get(e.from).push(e.to));
  const elites = () => nodes.filter(n => n.type === "elite");
  // 強敵を落とすときも、同じ行に既にある種類とは被らせない
  const demote = n => {
    const used = new Set(rows[n.row].filter(x => x !== n).map(x => x.type));
    n.type = ["battle","horde","treasure","rest"].find(t => !used.has(t)) || "battle";
  };
  // (1) 総数を3以下に（超過分をランダムに通常戦へ）
  let es = elites();
  while (es.length > 3) { demote(es[Math.floor(Math.random() * es.length)]); es = elites(); }
  // (2) 分岐先の全部が強敵という「選択肢なしの詰み」を作らない（必ず1つは避けられる道を残す）
  for (const n of nodes) {
    const kids = succ.get(n.id);
    if (kids.length > 1 && kids.every(k => byId.get(k).type === "elite")) demote(byId.get(kids[0]));
  }
  // (3) 保険：どのルートでも強敵は最大2つまで。各ノードから最下層までの最大強敵数をDPで求め、
  //     最大ルート上の強敵を1つ通常戦に落とす、を上限内に収まるまで繰り返す
  const routeMax = () => {
    const memo = new Map();
    const dfs = id => {
      if (memo.has(id)) return memo.get(id);
      let best = 0; for (const k of succ.get(id)) best = Math.max(best, dfs(k));
      const v = (byId.get(id).type === "elite" ? 1 : 0) + best;
      memo.set(id, v); return v;
    };
    let mx = 0; for (const s of rows[0]) mx = Math.max(mx, dfs(s.id));
    return { mx, memo };
  };
  for (let guard = 0; guard < 60; guard++) {
    const { mx, memo } = routeMax();
    if (mx <= 2) break;
    let cur = rows[0].reduce((a, b) => memo.get(b.id) > memo.get(a.id) ? b : a).id;
    const onPath = [];
    while (true) {
      const n = byId.get(cur);
      if (n.type === "elite") onPath.push(n);
      const kids = succ.get(cur);
      if (!kids.length) break;
      cur = kids.reduce((a, b) => memo.get(b) > memo.get(a) ? b : a);
    }
    if (!onPath.length) break;
    demote(onPath[Math.floor(onPath.length / 2)]);
  }
  // (4) 逆に少なすぎないように：強敵が2つ未満のマップは、強敵の無い段に足して「選択肢として2回」出す
  for (let guard = 0; guard < 8 && elites().length < 2; guard++) {
    const cand = nodes.filter(n => n.row >= 2 && n.row <= ROWS - 2 && n.n > 1
      && (n.type === "battle" || n.type === "horde" || n.type === "treasure")
      && !rows[n.row].some(x => x.type === "elite")
      // ボス直前の「立て直せる枠」は潰さない
      && !(n.row === ROWS - 2 && !rows[n.row].some(x => x !== n && (x.type === "rest" || x.type === "treasure"))));
    if (!cand.length) break;
    const t = cand[Math.floor(Math.random() * cand.length)];
    t.type = "elite";
    // 足したせいで1ルート3回以上になったら取り消す
    if (routeMax().mx > 2) { demote(t); break; }
  }
  return { nodes, edges, rows };
};

    else list = [

    return { id:"e"+(UID++), kind:e.kind, name:k.name, hp, max:hp,
      atk: Math.max(1, Math.round(k.atk * as * e.atkM * (e.boss ? bossAtk : atkAct)
        * (e.boss ? (ura ? (URA_BOSS_ATK_EXTRA[act] || 1) : 1) : (ura && act === 4 ? FINAL_ACT_ATK : 1)))),
      soloUp: (e.boss && ura && act === 4) ? FINAL_BOSS_SOLO : 0, // 取り巻き全滅で火力アップ
      bigX: e.boss ? 1 : (act >= 1 ? 1.0 : 1.1), alive:true, pi:0,
      pat: pick(k.pats), rollMul: rollDmg(),

const findGroup = (cells, idx) => {
  const start = cells[idx];
  const seen = new Set(), ids = new Set(), stack = [idx];
  const push = i => { const r = Math.floor(i/SIZE), c = i%SIZE;
    if (r > 0) stack.push(i-SIZE); if (r < SIZE-1) stack.push(i+SIZE);
    if (c > 0) stack.push(i-1); if (c < SIZE-1) stack.push(i+1); };

  let base = start.wild ? -1 : start.type;

    const cell = cells[i];
    if (cell.type === JUNK) continue; // お邪魔は繋がらない
    if (!cell.wild) {

    if (c > 0) stack.push(i-1); if (c < SIZE-1) stack.push(i+1); };

    if (cell.type === JUNK || cell.wild) continue; // お邪魔・虹はここで止まる（含めない）

    const done = () => { imgActive--; IMG_DONE.add(src); imgWaiters.forEach(f => f()); pumpImg(); };

// front=true で列の先頭に割り込ませる（すぐ要る画像を優先）
const warmImgs = (list, front) => {
  const add = list.filter(s => s && !IMG_WARM.has(s) && imgQueue.indexOf(s) < 0);
  if (!add.length) return;
  if (front) imgQueue.unshift(...add); else imgQueue.push(...add);

};
// リストが揃うまで待つ。onProgress(済, 全) で進捗、timeoutMs で打ち切り（揃わなくても先へ進む）
const waitImgs = (list, onProgress, timeoutMs) => new Promise(resolve => {
  const uniq = [...new Set(list.filter(Boolean))];
  warmImgs(uniq, true);
  let fin = false;
  const finish = ok => { if (fin) return; fin = true; imgWaiters.delete(check); clearTimeout(timer); resolve(ok); };
  const check = () => {
    const n = uniq.filter(s => IMG_DONE.has(s)).length;
    if (onProgress) onProgress(n, uniq.length);
    if (n >= uniq.length) finish(true);
  };
  const timer = setTimeout(() => finish(false), timeoutMs || 15000);
  imgWaiters.add(check);
  check();
});

// スレスパ風のHPバー: 深紅のバーに「現在/最大」を白文字で重ね、ダメージを受けると

// バトルシーン中央の演出テキスト1行。折り返し禁止のうえ、親（シーン内寸ぴったりの
// inset-0 コンテナ）の実測幅からはみ出す場合だけフォントを縮小して1行に収める。
// useLayoutEffect は描画前に同期実行されるので、基準サイズで一瞬見えてから縮むちらつきはない
function FxLine({ text, color }) {
  const ref = useRef(null);
  const [fs, setFs] = useState(null); // null=基準サイズ 1.35rem
  useLayoutEffect(() => {
    const el = ref.current;
    if (!el || !el.parentElement) return;
    // fxPop アニメは22%地点で scale(1.12) まで膨らむので、その瞬間も枠内に収まる幅を確保する
    const avail = el.parentElement.clientWidth * 0.97 / 1.12;
    const w = el.scrollWidth;
    if (w > avail && avail > 0) setFs(Math.max(11, parseFloat(getComputedStyle(el).fontSize) * avail / w));
  }, [text]);
  return h("div", { ref, style:{ fontSize: fs !== null ? fs + "px" : "1.35rem", fontWeight:900, color, textShadow:"0 2px 0 #000", whiteSpace:"nowrap", animation:"fxPop .7s ease forwards" } }, text);
}

  // ===== キャラ固有スキルのチュートリアル（キャラごとに初回バトルで一度だけ） =====
  // step遷移: recolor: btn→cycle1→cycle2→paint→done / buff: btn→toggle→clear→done / store: btn→clear→done（切替なし）

  const [ctut, setCtutState] = useState(null);

  // 対象グループを選ぶ: 塗り替え用は「現インク色以外の2〜5個」、消去用は「3個以上」の最大グループ
  const pickCtutSeed = forPaint => {
    const b = boardRef.current;
    const seen = new Set();
    let best = -1, bestSize = 0, maxI = 0, maxS = 0;
    for (let i = 0; i < b.length; i++) {
      const c = b[i];
      if (seen.has(c.id) || c.type === JUNK || c.wild || c.special) continue;
      const g = findGroup(b, i);
      g.forEach(id => seen.add(id));
      if (g.size > maxS) { maxS = g.size; maxI = i; }
      if (forPaint && c.type === paintColorRef.current) continue;
      const ok = forPaint ? (g.size >= 2 && g.size <= 5) : g.size >= 3;
      if (ok && g.size > bestSize) { best = i; bestSize = g.size; }
    }
    return best >= 0 ? best : maxI;

  // 鍛冶の生成チュートリアル用: 3個以上つながった同色グループを保証して種を返す
  // （最大グループが3個未満なら、隣接セルを同色に染めて拡張する）
  const pickCtutSeedGen = () => {
    const b = boardRef.current.slice();
    const seedI = pickCtutSeed(false);
    const color = b[seedI].type;
    let grp = findGroup(b, seedI);
    let changed = false, guard = 0;
    while (grp.size < 3 && guard++ < 30) {
      const gi = b.map((c, i) => grp.has(c.id) ? i : -1).filter(i => i >= 0);
      let ext = -1;
      for (const i of gi) {
        const r = Math.floor(i / SIZE), c = i % SIZE;
        for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
          if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
          const cell = b[nr * SIZE + nc];
          if (!grp.has(cell.id) && cell.type !== JUNK && !cell.wild && !cell.special) { ext = nr * SIZE + nc; break; }
        }
        if (ext >= 0) break;
      }
      if (ext < 0) break;
      b[ext] = { ...b[ext], type: color };
      changed = true;
      grp = findGroup(b, seedI);
    }
    if (changed) commitBoard(b);

  };
  // 指定グループの消去/塗り替えが済んだら締めへ（完了フラグもここで保存）

  const [tv, setTv] = useState({ atk:0, def:0, heal:0 });
  const [dispTv, setDispTv] = useState({ atk:0, def:0, heal:0 });
  const dispRef = useRef({ atk:0, def:0, heal:0 });
  const dispRafRef = useRef(null);
  useEffect(() => {

    if (dispRafRef.current) cancelAnimationFrame(dispRafRef.current);
    // 減少（ターンリセット等）は即時反映
    if (to.atk < from.atk || to.def < from.def || to.heal < from.heal) {

    }
    if (to.atk === from.atk && to.def === from.def && to.heal === from.heal) return;
    const t0 = performance.now() + 360; // 粒子の到着に合わせる
    const step = now => {
      if (now < t0) { dispRafRef.current = requestAnimationFrame(step); return; }
      const p = Math.min(1, (now - t0) / 300);
      const cur = {
        atk: Math.round(from.atk + (to.atk - from.atk) * p),
        def: Math.round(from.def + (to.def - from.def) * p),
        heal: Math.round(from.heal + (to.heal - from.heal) * p)
      };
      dispRef.current = cur; setDispTv(cur);
      if (p < 1) dispRafRef.current = requestAnimationFrame(step);
    };
    dispRafRef.current = requestAnimationFrame(step);
  }, [tv.atk, tv.def, tv.heal]);
  // ガレス強化の段階演出: {st, from, to, mult, stage} stage1=元の値 → stage2=元の値×倍率 → stage3=最終値
  const [buffAnim, setBuffAnim] = useState(null);
  // ノア蓄積の段階演出（攻防同時）: {fromAtk, fromDef, toAtk, toDef, add, stage} stage2=元の値+蓄積 → stage3=最終値
  const [storeAnim, setStoreAnim] = useState(null);
  // 上限ダメージ持ちの敵が初登場したときの説明カード（値=その敵の上限。1回きり db_tut_dcap）
  const [dcapTut, setDcapTut] = useState(null);
  // 特殊ドロップの説明カード（2枚・1回きり db_tut_sp）: 2ターン目の開始時に表示（初回3枚の直後に連続で出さない）
  const [spTut, setSpTut] = useState(null);
  useEffect(() => {

    if (!board.some(c => c.special)) return; // 盤面に特殊が無いターンは見送り（次のターン開始で再判定）
    let base = "", seen = "";
    try { base = localStorage.getItem("db_tut") || ""; seen = localStorage.getItem("db_tut_sp") || ""; } catch (e) {}
    if (base && !seen) setSpTut(0);
  }, [turn, status, tut, gtut, ctut]);
  const freshTurn = () => ({ atk: hasR("warring") ? 10 : 0, def: hasR("guardring") ? 10 : 0, heal:0, pierce:false, atkBoost:false, defBoost:false, stun:false, aoe:false, aoeUp:false });
  const turnRef = useRef(freshTurn());
  const syncTurn = () => setTv({ ...turnRef.current });

  const boardRef = useRef(board);
  const actionRef = useRef(action);
  const usedRef = useRef(used);
  const lockedRef = useRef(locked);
  const statusRef = useRef(status);

  const addLog = lines => setLog(p => [...p, ...lines].slice(-40));
  const commitBoard = next => { boardRef.current = next; setBoard(next); };

  // 演出キュー
  const fxTimer = useRef(null);
  const fxKeyRef = useRef(0); // fx行の通し番号。seq内indexだと直前のfxと同じキーになることがあり、
                              // 再マウントされず fxPop(forwards) 済みの opacity:0 のまま文言だけ差し替わって見えなくなる
  const playFx = (seq, after) => {

      if (item.text) setFx([{ ...item, _k: ++fxKeyRef.current }]);

  const [sv, setSv] = useState(null); // 敵ターン中のシールド残量表示

  // ===== ターン解決：自攻撃 → 敵攻撃(全員) → 回復 =====
  const resolveTurn = useCallback(() => {
    if (statusRef.current !== "battle") return; // 中断・リスタート後に残った遅延呼び出しを無効化
    // ガレスの強化: 予約された倍率を「攻撃を開始する直前」のここで計算する
    const pend = turnRef.current.buffPend;
    let buffStep = null;
    if (pend) {
      const oldV = turnRef.current[pend.st];
      const newV = Math.round(oldV * pend.mult);
      turnRef.current[pend.st] = newV;
      if (pend.horn > 0) {

      // 段階演出: 「強化」テキストと同時に ×倍率 を表示 → 最終値（元の値だけ見せる待ちは廃止・1テンポ短縮）
      setBuffAnim({ st: pend.st, from: oldV, to: newV, mult: pend.mult, stage: 2 });
      setTimeout(() => setBuffAnim(a => (a && a.to === newV ? { ...a, stage: 3 } : a)), 620);
      // 消すのはターン終了時（攻撃/防御の数値が0に戻るタイミング）— resolveTurn 末尾の freshTurn を参照
      // text は持たせない: 敵/プレイヤー側に出す演出テキストはダメージと被ダメージだけにする。
      // 効果音も鳴らさない（攻撃音と重なって「ダダン」と二度鳴りして聞こえるため）。
      // 数値の段階表示(620ms)を見せるぶんの間だけ確保する
      buffStep = { act:"heal", wait: FAST ? 40 : 700 };
    }
    // ノアの蓄積: 強化と同じくここで攻防へ加算する（消した瞬間ではなく攻撃の直前）
    const spend = turnRef.current.storePend;
    let storeStep = null;
    if (spend) {
      const fromAtk = turnRef.current.atk, fromDef = turnRef.current.def;
      const toAtk = fromAtk + spend.add, toDef = fromDef + spend.add;
      turnRef.current.atk = toAtk;
      turnRef.current.def = toDef;
      turnRef.current.storePend = null;
      syncTurn();
      setStoreAnim({ fromAtk, fromDef, toAtk, toDef, add: spend.add, stage: 2 });
      setTimeout(() => setStoreAnim(a => (a && a.toAtk === toAtk ? { ...a, stage: 3 } : a)), 620);
      // 消すのはターン終了時（攻撃/防御が0に戻るタイミング）
      // 強化と同様、テキストも効果音も出さず間だけ（加算は攻撃/防御の数値と光りで見せる）
      storeStep = { act:"heal", wait: FAST ? 40 : 700 };
    }
    let { atk, def, heal } = turnRef.current;
    recordCharStats(curCharRef.current, atk, def); // このターンの攻撃力/防御力で記録更新
    const seq = [];
    const logs = [`― ターン ${turnNumRef.current} ―`];
    if (buffStep) seq.push(buffStep);
    if (storeStep) seq.push(storeStep);
    const ens = enemiesRef.current.map(e => ({ ...e }));
    const tn = turnNumRef.current;

    // ① プレイヤー攻撃：単体（貫通=余剰が次へ / 全=敵全体に同じダメージ）
    if (atk > 0 && turnRef.current.aoe) {
      const dmgAll = Math.round(atk * (turnRef.current.aoeUp ? 1.2 : 1));
      const alive = ens.filter(e => e.alive);
      let first = true;
      for (const en of alive) {
        let remA = dmgAll;
        let dealtS = 0;
        if ((en.shd || 0) > 0) {
          const eff = hasR("ram") ? 2 : 1;
          dealtS = Math.min(en.shd, remA * eff);
          en.shd -= dealtS;
          remA -= Math.ceil(dealtS / eff);
        }
        const capA = en.dcap ? Math.min(remA, en.dcap) : remA; // 上限ダメージ
        const dealtH = Math.min(en.hp, Math.max(0, capA));
        const dispA = Math.max(0, capA); // 表示用: 残りHPで頭打ちしない（HP20の敵に100攻撃なら「100」と見せる）
        en.hp -= dealtH;
        if (en.hp <= 0) en.alive = false;
        const snap = ens.map(e => ({ ...e }));
        const isFirst = first; first = false;
        const dead = !en.alive;
        seq.push({
          text: dealtH > 0
            ? `${isFirst ? "乱れ斬り！" : ""}${en.name}に ${dispA}！`
            : `${en.name}のシールドが受け止めた！`,
          color: dealtH > 0 ? "#ff9a3c" : "#9db8e8", act: "atk",
          wait: 520,
          run: () => {
            if (isFirst) setAnim("hero", "attack");
            SFX.don();
            setTimeout(() => {
              setAnim(en.id, dead ? "die" : "hit");
              addPop(en.id, dealtH > 0 ? "-" + dispA : "BLOCK", dealtH > 0 ? "#ffe2de" : "#9db8e8");
              if (isFirst && dealtH > 0) setShakeSeq(q => q + 1); // 攻撃の着弾（実ダメージ）で画面を揺らす
              if (dead && en.boss) setFlashSeq(q => q + 1);
            }, 160);
            setTimeout(() => setEnemiesBoth(snap), 180);
          }
        });
        logs.push(`⚔全 ${en.name}に ${dispA}${dead ? "（撃破）" : ""}`);
      }
    } else if (atk > 0) {
      const pierce = turnRef.current.pierce;
      const alive = ens.filter(e => e.alive);
      const tgt = alive.find(e => e.id === targetRef.current) || alive[0];
      const order = tgt ? (pierce ? [tgt, ...alive.filter(e => e !== tgt)] : [tgt]) : [];
      let rem = atk;
      let first = true;
      for (const en of order) {
        if (rem <= 0) break;
        let dealtS = 0;
        if ((en.shd || 0) > 0) {
          const eff = hasR("ram") ? 2 : 1; // 破城槌: シールドに2倍
          dealtS = Math.min(en.shd, rem * eff);
          en.shd -= dealtS;
          rem -= Math.ceil(dealtS / eff);
        }
        const capR = en.dcap ? Math.min(rem, en.dcap) : rem; // 上限ダメージ
        const dealtH = Math.min(en.hp, capR);
        // 表示用: 残りHPで頭打ちしない。ただし貫通時は余りが次の敵の表示に乗るので実ダメージのまま（二重計上を防ぐ）
        const dispR = pierce ? dealtH : Math.max(0, capR);
        en.hp -= dealtH;
        rem = pierce ? rem - dealtH : 0;
        if (en.hp <= 0) en.alive = false;
        const snap = ens.map(e => ({ ...e }));
        const isFirst = first; first = false;
        const dead = !en.alive;
        const txt = dealtH > 0
          ? `${isFirst ? "" : "貫通！"}${en.name}に ${dispR}！`
          : `${en.name}のシールドが受け止めた！`;
        seq.push({
          text: txt, color: dealtH > 0 ? "#ff6b6b" : "#9db8e8", act: "atk",
          run: () => {
            if (isFirst) setAnim("hero", "attack");
            SFX.don();
            setTimeout(() => {
              setAnim(en.id, dead ? "die" : "hit");
              addPop(en.id, dealtH > 0 ? "-" + dispR : "BLOCK", dealtH > 0 ? "#ffe2de" : "#9db8e8");
              if (dealtS > 0) SFX.crack();
              if (isFirst && dealtH > 0) setShakeSeq(q => q + 1); // 攻撃の着弾（実ダメージ）で画面を揺らす
              if (dead && en.boss) setFlashSeq(q => q + 1);
            }, 160);
            setTimeout(() => setEnemiesBoth(snap), 180);
          }
        });
        logs.push(`${isFirst ? "⚔" : "⚔貫通"} ${en.name}に ${dispR}${dealtS > 0 ? `（盾-${dealtS}）` : ""}${dead ? "（撃破）" : ""}`);
      }
    }

    const allDead = ens.every(e => !e.alive);
    if (allDead && ens.length) {
      if (heal > 0) {
        const before = pRef.current;
        const np = Math.min(pMaxRef.current, before + heal);
        if (np - before > 0) {
          seq.push({ text: `${np - before} 回復！`, color: "#5bd98a", act: "heal",
            run: () => { setPHP(np); setAnim("hero","heal"); SFX.cure(); flash("heal"); addPop("hero", "+" + (np - before), "#8ce8b0"); } });
          logs.push(`✚ ${np - before} 回復`);
        }
      }
      logs.push("🏆 勝利！");
      addLog(logs);
      playFx(seq, () => onVictoryRef.current());
      return;
    }

    // ② 敵の行動（パターン制）。防御はシールドとして全ヒット共通で消費
    // 取り巻きが全滅した瞬間の演出（裏5章ボス: 以降の火力アップ）
    const soloBoss = ens.find(e => e.alive && e.soloUp && !ens.some(a => a.alive && a.id !== e.id));
    if (soloBoss && !soloShownRef.current) {
      soloShownRef.current = true;
      seq.push({ text: `${soloBoss.name}が怒気を放った！`, color: "#ff5c7a",
        run: () => { setAnim(soloBoss.id, "attack"); SFX.crack(); flash("player"); } });
      logs.push(`👿 取り巻きが倒れ、${soloBoss.name}の攻撃力が上がった`);
    }
    let shield = def;
    let php = pRef.current;
    if (turnRef.current.stun) {
      seq.push({ text:"⏳ 時は止まっている…", color:"#c9a2ff", run: () => SFX.tap() });
      logs.push("⏳ 敵は動けない（時止めの砂）");
    }
    for (const en of ens) {
      if (turnRef.current.stun) break; // 行動もパターン進行も1ターン遅れる
      if (!en.alive) continue;
      const actsN = (en.enr || 0) >= 3 ? 2 : 1; // 激昂3以上で2回行動
      for (let ai = 0; ai < actsN; ai++) {
      const iv = intentOf(en, ens);
      en.pi++;
      if (iv.act === "jamatk") {
        const jn = iv.jamN; // 減算は intentOf 側で済ませてある（予告と同じ数）
        seq.push({ text: `${en.name}の呪撃！ドロップ${jn}個汚染`, color: "#e8a2ff",
          run: () => { setTimeout(() => { commitBoard(jamBoard(boardRef.current, jn)); SFX.jam(); }, 150); } });
        logs.push(`⚔🌀 ${en.name}の呪撃（お邪魔${jn}個）`);
        iv.act = "attack";
        iv.dmg = iv.hit;
      }
      if (iv.act === "charge") {
        seq.push({ text: `${en.name}は力をためている…`, color: "#ffd88a",
          run: () => { setAnim(en.id, "heal"); SFX.charge(); } });
        logs.push(`⏳ ${en.name}は力をためている`);
        continue;
      }
      if (iv.act === "jam") {
        const jn = iv.jamN;
        seq.push({ text: `${en.name}の呪い！ドロップ${jn}個が汚染`, color: "#c9a2ff",
          run: () => {
            setAnim(en.id, "attack");
            setTimeout(() => { commitBoard(jamBoard(boardRef.current, jn)); SFX.jam(); }, 220);
          } });
        logs.push(`🌀 ${en.name}がドロップ${jn}個をお邪魔に変えた`);
        continue;
      }
      if (iv.act === "poison") {
        // 毒は重ねがけで累積する（4を受けている状態で更に4を受けると毎ターン8）
        const pTotal = poisonRef.current + POISON_DMG;
        const stacked = poisonRef.current > 0;
        poisonRef.current = pTotal;
        seq.push({ text: stacked ? `${en.name}の毒霧！毒が強まった！` : `${en.name}の毒霧！`, color: "#8ce87c",
          run: () => {
            setAnim(en.id, "attack");
            setTimeout(() => { SFX.jam(); addPop("hero", stacked ? `毒+${POISON_DMG}` : "毒", "#8ce87c", "assets/st_poison.png"); setPoisonView(pTotal); }, 220);
          } });
        logs.push(stacked
          ? `🐍 ${en.name}の毒霧！毒が重なって毎ターン${pTotal}ダメージに（+${POISON_DMG}）`
          : `🐍 ${en.name}の毒霧！このバトル中、毎ターン${pTotal}ダメージ`);
        continue;
      }
      if (iv.act === "healally") {
        const tgts = ens.filter(a => a.alive && a.id !== en.id && a.hp < a.max);
        const tg = tgts.sort((a,b) => a.hp/a.max - b.hp/b.max)[0];
        if (tg) {
          const amt = Math.min(iv.heal, tg.max - tg.hp);
          tg.hp += amt;
          const snap = ens.map(e => ({ ...e }));
          seq.push({ text: `${en.name}が${tg.name}を${amt}回復`, color: "#8ce8b0",
            run: () => {
              setAnim(en.id, "attack");
              setTimeout(() => { setAnim(tg.id, "heal"); setEnemiesBoth(snap); SFX.heal(); addPop(tg.id, "+" + amt, "#8ce8b0"); }, 200);
            } });
          logs.push(`💚 ${en.name}が${tg.name}を${amt}回復`);
        } else {
          seq.push({ text: `${en.name}は様子をうかがっている`, color: "#b8b2c4",
            run: () => SFX.tap() });
          logs.push(`… ${en.name}は様子をうかがっている`);
        }
        continue;
      }
      if (iv.act === "drain") {
        const one = iv.dmg;
        const blocked = Math.min(shield, one);
        const broke = blocked > 0 && shield - blocked <= 0 && one > blocked;
        shield -= blocked;
        const shAfter = shield;
        let through = one - blocked;
        if (through > 0 && hasR("mist") && tn === 1) through = Math.ceil(through / 2); // 霧のマント（攻撃系と同様に吸血にも適用）
        php = Math.max(0, php - through);
        const np = php;
        const healed = Math.min(en.max - en.hp, through);
        en.hp += healed;
        const snap = ens.map(x => ({ ...x }));
        seq.push({
          text: through > 0 ? `${broke ? "防御崩壊！" : ""}${en.name}の吸血 ${through}！` : `${en.name}の吸血をガード！`,
          color: through > 0 ? "#ff9ad0" : "#7da8e8", act:"def",
          run: () => {
            setAnim(en.id, "attack");
            setTimeout(() => {
              setPHP(np); setSv(shAfter);
              if (broke) SFX.crack();
              if (through > 0) {
                setAnim("hero","hit"); SFX.hurt(); flash("player");
                addPop("hero", "-" + through, "#ff9ad0");
                if (healed > 0) setTimeout(() => { setAnim(en.id, "heal"); setEnemiesBoth(snap); SFX.heal(); addPop(en.id, "+" + healed, "#8ce8b0"); }, 300);
              } else { SFX.kiin(); addPop("hero", "ガード", "#9db8e8"); }
            }, 200);
          }
        });
        logs.push(through > 0 ? `🩸 ${en.name}の吸血 ${through}（${healed}回復）` : `🛡 ${en.name}の吸血を防いだ`);
        if (php <= 0) break;
        continue;
      }
      // 攻撃系（attack / double / bigatk）
      for (let hi = 0; hi < iv.hits; hi++) {
        const one = iv.hits > 1 ? iv.hit : iv.dmg;
        const blocked = Math.min(shield, one);
        const broke = blocked > 0 && shield - blocked <= 0 && one > blocked; // この一撃で防御が砕けた
        shield -= blocked;
        const shAfter = shield;
        let through = one - blocked;
        if (through > 0 && hasR("mist") && tn === 1) through = Math.ceil(through / 2); // 霧のマント
        php = Math.max(0, php - through);
        const np = php;
        const big = iv.act === "bigatk";
        seq.push({
          text: through > 0 ? `${broke ? "防御崩壊！" : ""}${en.name}の${big ? "大攻撃" : "攻撃"} ${through}！` : `${en.name}の攻撃をガード！`,
          color: through > 0 ? (big ? "#ff5c5c" : "#ffae42") : "#7da8e8",
          act: "def",
          wait: iv.hits > 1 ? 480 : 680,
          run: () => {
            setAnim(en.id, "attack");
            setTimeout(() => {
              setPHP(np);
              setSv(shAfter);
              if (broke) SFX.crack();
              if (through > 0) {
                setAnim("hero","hit"); SFX.hurt(); flash("player");
                addPop("hero", "-" + through, big ? "#ff5c5c" : "#ffb08a");
                if (big) { setShakeSeq(q => q + 1); setFlashSeq(q => q + 1); }
              } else { SFX.kiin(); addPop("hero", "ガード", "#9db8e8"); }
            }, 200);
          }
        });
        logs.push(through > 0 ? `${big ? "💥" : "🗡"} ${en.name}の攻撃 ${through}` : `🛡 ${en.name}の攻撃を防いだ`);
        if (php <= 0) break;
      }
      if (php <= 0) break;
      }
      if (php <= 0) break;
    }

    // ③ 回復
    let overheal = 0; // 聖者の祈祷書: 最大HPを超えた回復ぶんを次ターンの防御へ（最大30）
    if (php > 0 && heal > 0) {
      if (hasR("prayerbook") && php + heal > pMaxRef.current) overheal = Math.min(30, php + heal - pMaxRef.current);
      const np = Math.min(pMaxRef.current, php + heal);
      if (np - php > 0) {
        const healed = np - php;
        seq.push({ text: `${healed} 回復！`, color: "#5bd98a", act: "heal",
          run: () => { setPHP(np); setAnim("hero","heal"); SFX.cure(); flash("heal"); addPop("hero", "+" + healed, "#8ce8b0"); } });
        logs.push(`✚ ${healed} 回復`);
      }
      php = np;
    }
    // ④ 毒ダメージ（防御無視・このバトル中は毎ターン発生し続ける）
    if (php > 0 && poisonRef.current > 0) {
      const pdmg = Math.min(php, poisonRef.current);
      php -= pdmg;
      const np = php;
      seq.push({ text: `毒 ${pdmg}！`, color: "#8ce87c", act: "poison", // 毒は防御無視なので防御ボタンは光らせない
        run: () => {
          setPHP(np); setAnim("hero","hit"); SFX.hurt(); flash("player");
          addPop("hero", "-" + pdmg, "#8ce87c");
        } });
      logs.push(`🐍 毒ダメージ ${pdmg}`);
    }
    const finalHp = php;
    addLog(logs);
    playFx(seq, () => {
      const regenLogs = [];
      for (const en of ens) {
        if (!en.alive) continue;
        en.rollMul = rollDmg(); // 次の行動のダメージを振り直す
        HAD_ALLIES[en.id] = ens.some(a => a.alive && a.id !== en.id); // 次ターンの回復役判定用スナップショット
        if (!SIM_MODE && en.enrEvery && tn % en.enrEvery === 0) {
          en.enr = (en.enr || 0) + 1;
          en.atk = Math.round(en.atk * 1.08);
          regenLogs.push(`🔥 ${en.name}が激昂！攻撃力上昇${en.enr === 3 ? "・2回行動に！" : `（${en.enr}）`}`);
          const eid = en.id, twice = en.enr === 3;
          setTimeout(() => { addPop(eid, twice ? "激昂!×2行動" : "激昂!攻撃UP", "#ff8a5a"); setAnim(eid, "heal"); }, 250);
        }
        if (!SIM_MODE && en.shdMax && Math.random() < en.shdC) {
          const gain = Math.round(en.shdMax * (0.5 + Math.random() * 0.5));
          if (gain > (en.shd || 0)) { en.shd = gain; regenLogs.push(`🛡 ${en.name}がシールドを張った（${gain}）`); }
        }
      }
      if (regenLogs.length) addLog(regenLogs);
      setEnemiesBoth(ens.map(e => ({ ...e })));
      setSv(null);
      if (finalHp <= 0) {
        const fi = itemsRef.current.indexOf("phoenix");
        if (fi >= 0) {
          setItemsBoth(itemsRef.current.filter((_, i) => i !== fi));
          setPHP(Math.round(pMaxRef.current * 0.4));
          setAnim("hero", "heal"); SFX.heal(); flash("heal");
          addLog(["🪶 不死鳥の羽が燃え上がる！HP40%で復活"]);
        } else {
          setStatus("lose"); statusRef.current = "lose";
          setLocked(true); lockedRef.current = true;
          SFX.lose();
          return;
        }
      }
      turnRef.current = freshTurn();
      setBuffAnim(null); setStoreAnim(null); // 強化の×倍率・蓄積の+N表示は攻撃/防御が0に戻るここまで残す
      setPops({}); // 前ターンのダメージ表示を掃除（撃破された敵の分が残り続けていた）
      if (hasR("ironwill") && shield > 0) turnRef.current.def += Math.floor(shield / 2);
      if (overheal > 0) { turnRef.current.def += overheal; addLog([`📿 祈祷書: あふれた回復${overheal}が防御に`]); }
      if (hasR("regen")) setPHP(Math.min(pMaxRef.current, pRef.current + 2));
      // 星辰の錫杖（ルクス専用）: 盤面に虹が無ければランダム1個が虹になる
      if (hasR("starstaff") && !boardRef.current.some(c => c.wild)) {
        const cand = boardRef.current.map((c, i) => (!c.special && !c.wild && c.type !== JUNK) ? i : -1).filter(i => i >= 0);
        if (cand.length) {
          const wi = cand[Math.floor(Math.random() * cand.length)];
          const nb = boardRef.current.slice();
          nb[wi] = { ...nb[wi], wild: true };
          commitBoard(nb);
          addLog(["🌠 錫杖が輝き、虹ドロップが生まれた"]);
        }
      }
      syncTurn();
      setUsed(new Set()); usedRef.current = new Set();
      setAction(actOrderRef.current[0]); actionRef.current = actOrderRef.current[0];
      setTurn(t => t + 1);
      setLocked(false); lockedRef.current = false;
    });
  }, []);

  // ===== 勝利 → 報酬 =====
  const onVictoryRef = useRef(() => {});
  onVictoryRef.current = () => {
    const node = pendingNodeRef.current;
    if (node && node.type === "boss") {
      SFX.win();
      if (actRef.current === 1 && modeRef.current !== "ura") unlockChar(1); // 表2章ボス撃破 → 2体目解放
      // 章クリア（レリック選択）→ 強化済み特殊ドロップ選択 → 次章
      if (actRef.current < curActs() - 1) { setActClear({ picks: pickRelics(3, "boss") }); return; }
      recordClear();                            // 最終章ボス撃破 → クリア記録＆解放判定（裏は裏クリアとして記録）
      bumpCharClear(curCharRef.current);         // このキャラの突破数+1
      setStatus("clear"); statusRef.current = "clear";
      return;
    }
    SFX.win();
    const row = node ? node.row : 0;
    let gain = node && node.type === "elite" ? 60 + row * 5
      : node && node.type === "horde" ? 40 + row * 4 : 25 + row * 4;
    if (hasR("piggy")) gain += 10;
    if (hasR("scale")) gain = Math.round(gain * 1.5);
    setCoinsBoth(coinsRef.current + gain);
    addLog([`💰 コイン +${gain}`]);
    // 勝利時の自動回復(7%)は廃止。レリックの回復(弁当箱)はユーザー指示で維持
    if (hasR("bento")) setPHP(Math.min(pMaxRef.current, pRef.current + 8));
    let relicDrop = null;
    if (node && node.type === "elite") { relicDrop = pickRelics(1, "elite")[0] || null; if (relicDrop) addRelic(relicDrop); }
    let picks = shuffle(REWARD_KEYS.slice()).slice(0, hasR("magnet") ? 4 : 3);
    let healed = 0;
    if (node && node.type === "elite" && !picks.some(k => k === "atkx" || k === "defx")) picks[0] = pick(["atkx","defx"]);
    // 群れ勝利は候補1つごとに40%抽選 → 当たった候補だけ「強化済み（＋化）」で並ぶ
    const isHorde = !!(node && node.type === "horde");
    const ups = picks.map(() => isHorde && (upRewardForceRef.current != null ? !!upRewardForceRef.current : Math.random() < 0.4));
    // 群れ勝利時の+30回復も廃止（バトル終了時に回復しない）
    playFx([
      { text: "敵を撃破！", color:"#ffd54a", wait:850, run: () => {} },
      { text: `コイン +${gain} 獲得`, color:"#e8c06a", wait:850, run: () => SFX.coin() }
    ], () => {
      setRewards({ picks, kind: node ? node.type : "battle", healed, coins: gain, relic: relicDrop, step: relicDrop ? "relic" : "drop", ups });
      setStatus("reward"); statusRef.current = "reward";
    });
  };

  const finishNode = () => {
    resetBag(); // マップに戻る＝袋を全リセット（ユーザー指定仕様）
    const node = pendingNodeRef.current;
    if (node) {
      setVisited(v => new Set(v).add(node.id));
      setCurNodeId(node.id); curNodeRef.current = node.id;
    }
    pendingNodeRef.current = null;
    setStatus("map"); statusRef.current = "map";
    setLocked(false); lockedRef.current = false;
  };

  // 章クリアのレリック選択のあと: 強化済み特殊ドロップを1つ選ぶ（ボスは100%＋化）
  const afterActClear = () => {
    setActClear(null);
    const bpicks = shuffle(REWARD_KEYS.slice()).slice(0, hasR("magnet") ? 4 : 3);
    setRewards({ picks: bpicks, kind:"boss", healed:0, coins:0, relic:null, step:"drop", ups: bpicks.map(() => true) });
    setStatus("reward"); statusRef.current = "reward";
  };
  const afterReward = () => {
    setRewards(null);
    const pnode = pendingNodeRef.current;
    if (pnode && pnode.type === "boss") { nextAct(); return; } // ボス報酬 → 次章へ
    if (pnode && pnode.type === "horde" && (TEST_MODE || Math.random() < 0.5)) openShop();
    else if (pnode && pnode.type === "treasure" && !TEST_MODE && Math.random() < 0.35) openShop();
    else finishNode();
  };
  const declineReward = () => {
    SFX.tap();
    addLog(["特殊ドロップは受け取らなかった（袋はそのまま）"]);
    afterReward();
  };
  const chooseReward = (key, up) => {
    ownedRef.current = { ...ownedRef.current, [key]: ownedRef.current[key] + 1 };
    bagRef.current = { ...bagRef.current, [key]: bagRef.current[key] + 1 };
    if (up) { // 強化済みで獲得（鍛冶と同じ＋化状態）
      ownedUpRef.current = { ...ownedUpRef.current, [key]: ownedUpRef.current[key] + 1 };
      bagUpRef.current = { ...bagUpRef.current, [key]: bagUpRef.current[key] + 1 };
    }
    syncOwned();
    SFX.pick();
    if (up) { SFX.forge(); addLog([`🎁 強化済みの${ITEMS[key].name}を獲得 → ${DESC_UP[key]}`]); }
    else addLog([`🎁 ${ITEMS[key].name}を獲得`]);
    afterReward();
  };

  // ===== 章クリア → 次章 =====
  const nextAct = () => {
    const na = actRef.current + 1;
    setAct(na);
    if (hasR("crown")) setPMax(pMaxRef.current + 50);
    setPHP(pMaxRef.current); // 章クリア時の全回復（ユーザー指示で維持）
    setPoison(0); // 章クリアで毒も治る
    setCoinsBoth(coinsRef.current + 100);
    const m = genMap();
    setMap(m); mapRef.current = m;
    setCurNodeId(null); curNodeRef.current = null;
    setVisited(new Set());
    pendingNodeRef.current = null;
    setEnemiesBoth([]);
    setActClear(null);
    setStatus("map"); statusRef.current = "map";
    setLocked(false); lockedRef.current = false;
    addLog([`― ${modeRef.current === "ura" ? "裏・" : ""}第${na + 1}章「${actNameOf(modeRef.current, na)}」開始 ―`, hasR("crown") ? "🎁 最大HP+50・全回復・💰+100" : "🎁 全回復・💰+100"]);
    SFX.step();
  };

  // ===== ショップ（群れ勝利後・休憩所） =====
  const priceOf = (base, rate = 1) => Math.max(1, Math.round(base * (hasR("member") ? 0.8 : 1) * rate));
  // 商品ごとの割引率（初回セールと重ねない）。たまに 10/20/30%off が混ざる
  const rollDisc = () => { const r = Math.random(); return r < 0.70 ? 0 : r < 0.85 ? 0.1 : r < 0.95 ? 0.2 : 0.3; };
  const shopRate = k => { // 表示・購入で共通に使う倍率
    const s = shopRef.current;
    if (!s) return 1;
    return (s.sale || 1) * (1 - (s.disc && s.disc[k] ? s.disc[k] : 0));
  };
  const openShop = () => {
    shopNumRef.current += 1;
    const first = shopNumRef.current === 1; // 最初の行商人だけ半額セール
    const offers = shuffle(Object.keys(CONSUM)).slice(0, hasR("dice") ? 6 : 4);
    const relic = pickRelics(1)[0] || null;
    const disc = {};
    if (!first) { // 半額セール中は個別割引を出さない（値引きの二重掛けを避ける）
      for (const k of offers) disc[k] = rollDisc();
      if (relic) disc["__relic"] = rollDisc();
    }
    setShop({ offers, relic, intro: true, sale: first ? 0.5 : 1, disc });

  // ===== 宝箱パズル =====
  const startPuzzle = () => {

          const up = poolUp[kind] > 0 && Math.random() < poolUp[kind] / pool[kind];
          nb[target[t]] = { ...nb[target[t]], special: kind, up, extra: true };
          done++;
        }

      } else {

        const n = Math.min(stockRef.current, target.length);
        for (let t = 0; t < n; t++) { nb[target[t]] = { ...nb[target[t]], up: true }; done++; }
        if (done) addLog([`⚒ 特殊ドロップ${done}個を＋に鍛えた`]);
      }

      stockRef.current -= done; setStockView(stockRef.current);
      commitBoard(nb); syncBag();
      SFX.forge();
      if (mode === "gen") ctutFinish(1000); // 鍛冶チュートリアル: 生成された特殊を1秒見せてから締めへ
      const nu = new Set(usedRef.current); nu.add("heal");
      setUsed(nu); usedRef.current = nu;
      // 通常の消去パスと同様、ターン解決前にロックする（演出中のアイテム使用・中途半端な自動保存を防ぐ）
      if (nu.size >= 3) { setLocked(true); lockedRef.current = true; setTimeout(() => resolveTurn(), FAST ? 60 : 350); }
      else { const na = nextInOrder(nu); setAction(na); actionRef.current = na; }
      return;
    }
    // 賭博師：3つ目の「賭け」。今のモード（ボタンで循環）でグループを消し、天使/悪魔のコイントスへ。
    // 効果とHP消費はコイントスの後（成功=効果のみ・ノーコスト／失敗=HPだけ払う）
    if (act === "heal" && skill === "gamble") {
      const cell = boardRef.current[idx];
      if (cell.type === JUNK) { SFX.tap(); return; } // お邪魔だけのグループには賭けられない（アクション消費なし）
      const gx = expandClear(boardRef.current, idx, !turnRef.current.blastUsed, !turnRef.current.crossUsed, !turnRef.current.coreUsed);
      if (gx.blast) turnRef.current.blastUsed = true;
      if (gx.cross) turnRef.current.crossUsed = true;
      if (gx.red.length) turnRef.current.coreUsed = true;
      const ginfo = groupInfo(boardRef.current, gx.ids);
      if (ginfo.junk) { SFX.tap(); return; }
      const count = ginfo.count;
      const mode = gambleModeRef.current;
      const cost = gambleCost(mode, count); // 外したときに失うHP（成功時は0）
      // 賭けチップ（ジン専用）: グループ内の枚数だけ、外れたときに自動でコイントスをやり直す（＋化は2回分）
      const retries = ((ginfo.sp.chip || 0) - (ginfo.spu.chip || 0)) + (ginfo.spu.chip || 0) * 2;
      // 特殊ドロップのアクション非依存効果（剣/盾/ハート/金貨/貫通）は賭けでも発動する。
      // 効果は消した時点で確定＝コイントスの成否に依らない（賭けの対象はモード効果とHPコストだけ）
      const geff = computeEffect(act, ginfo);
      if (geff.splitAtk) turnRef.current.atk += geff.splitAtk;
      if (geff.splitDef) turnRef.current.def += geff.splitDef;
      if (geff.healBonus) turnRef.current.heal += geff.healBonus;
      if (ginfo.sp.pierce > 0) turnRef.current.pierce = true;
      if (ginfo.sp.gold > 0) {
        const g = (ginfo.sp.gold - ginfo.spu.gold) * 5 + ginfo.spu.gold * 12;
        setCoinsBoth(coinsRef.current + g);
        SFX.coin();
        addLog([`金 コイン+${g}`]);
      }
      syncTurn();
      const gll = [];
      if (geff.splitAtk) gll.push(`剣 攻撃+${geff.splitAtk}`);
      if (geff.splitDef) gll.push(`盾 防御+${geff.splitDef}`);
      if (geff.healBonus) gll.push(`♥ 回復+${geff.healBonus}`);
      if (ginfo.sp.pierce > 0) gll.push("貫 攻撃が貫通化！");
      if (gll.length) addLog([gll.join(" / ")]);
      const { next, newPositions } = refill(boardRef.current, gx.ids, bagRef, ownedRef, bagUpRef, ownedUpRef);
      // 賭けを持ち回る（消去演出の後にオーバーレイを開く）。newPositions は虹の賭けの落下先
      // mult=スター/トリプル倍率。効果にだけ乗る（コストは素のcountのまま）
      gamblePendRef.current = { mode, cost, count, retries, newPositions, mult: ginfo.mult };
      const nu = new Set(usedRef.current); nu.add("heal");
      gambleUsedRef.current = nu; // 結果確定後にこの used でターン進行を判定
      setUsed(nu); usedRef.current = nu;
      const clearedIdxs = [];
      boardRef.current.forEach((c, i) => { if (gx.ids.has(c.id)) clearedIdxs.push(i); });
      setLocked(true); lockedRef.current = true;
      flyParticles(clearedIdxs, "heal");
      setClearing(new Set(gx.ids));
      SFX.clear();
      setTimeout(() => {
        commitBoard(next); setClearing(new Set()); syncBag();
        // 消した直後に天使/悪魔のコイントスへ（この時点では効果もHP消費も未発動）
        setGambleAsk({ mode, cost, count, retries, mult: ginfo.mult, phase: "pick", pick: null, face: null, win: null });
      }, FAST ? 40 : 240);
      return;
    }
    const { ids, seedJunk, blast, cross, red } = expandClear(boardRef.current, idx, !turnRef.current.blastUsed, !turnRef.current.crossUsed, !turnRef.current.coreUsed);
    if (blast) turnRef.current.blastUsed = true;
    if (cross) turnRef.current.crossUsed = true; // 十字晶は1ターン1回
    if (red.length) turnRef.current.coreUsed = true; // 核レリックも1ターン1回
    const info = groupInfo(boardRef.current, ids);
    const eff = computeEffect(act, info);
    const pureCount = findGroup(boardRef.current, idx).size; // 「同じ色を◯個」の判定は素の同色グループ数で
    const { next, newPositions } = refill(boardRef.current, ids, bagRef, ownedRef, bagUpRef, ownedUpRef);
    // レリック生成の虹（ワイルド）特殊。消した位置(新規落下)へ置く
    const genKinds = [];
    if (hasR("linegem") && pureCount === 5) genKinds.push("linev");
    if (hasR("linegemh") && pureCount === 5) genKinds.push("lineh");
    if (hasR("gachagem") && pureCount >= 6) {
      const ownedSp = REWARD_KEYS.filter(k => ownedRef.current[k] > 0);
      if (ownedSp.length) genKinds.push(pick(ownedSp));
    }
    if (genKinds.length) {
      const freePos = shuffle(newPositions.slice());
      genKinds.forEach((k, gi) => { if (gi < freePos.length) next[freePos[gi]] = { ...next[freePos[gi]], special: k, up: false, wild: true }; });
      addLog(["🌈 虹ドロップが生まれた！"]);
    }
    // ―― キャラ専用ドロップ: 補充後の盤面に作用するもの ――
    // 星のしずく（ルクス）: 落ちてきた新ドロップのうちランダムN個を虹ドロップにする（盤面が急に変わると使いにくいので新ドロップ限定）
    if (info.sp.wildstar > 0) {
      const n = (info.sp.wildstar - info.spu.wildstar) + info.spu.wildstar * 2;
      // 新ドロップが袋の特殊で埋まっていても不発にならないよう、特殊なしを優先しつつ特殊にもフォールバック
      const pool = newPositions.filter(i => !next[i].wild && next[i].type !== JUNK);
      const cand = shuffle(pool.filter(i => !next[i].special)).concat(shuffle(pool.filter(i => next[i].special)));
      cand.slice(0, n).forEach(i => { next[i] = { ...next[i], wild: true }; });
      if (Math.min(n, cand.length) > 0) addLog(["雫 虹ドロップが生まれた！"]);
    }
    let mainAdd = eff.main;
    if (act === "atk" && turnRef.current.atkBoost) mainAdd *= 2;
    if (act === "def" && turnRef.current.defBoost) mainAdd *= 2;
    if (act === "heal" && skill === "buff") {
      // 強化キャラ：3つ目で消すと倍率を「予約」する。実際の計算はターン解決の攻撃直前
      // （＝強化を先に消しても、後から積んだ攻撃/防御にちゃんと倍率が乗る）
      const st = skillTargetRef.current;
      const inc = hasR("warforge2") ? 0.3 : hasR("warforge") ? 0.2 : 0.1;
      // 闘魂（ガレス専用ドロップ）: 強化で消すと1個につき倍率+0.2（＋化ドロップは+0.4）
      const wcBonus = ((info.sp.warcry || 0) - (info.spu.warcry || 0)) * 0.2 + (info.spu.warcry || 0) * 0.4;
      // スター/トリプル(info.mult)は増加分に乗る（1 + 増加分×mult）
      const factor = 1 + (inc * info.count + wcBonus) * info.mult; // 1ドロップにつき+inc の加算式（1個・+0.1 → 1.1倍、5個 → 1.5倍）
      // 軍神の号令（ガレス専用）: 選んでいない側にも半分の強化
      const horn = hasR("warhorn") ? 1 + ((inc * info.count + wcBonus) * info.mult) / 2 : 0;
      turnRef.current.buffPend = { st, mult: factor, horn };
      ctutFinish(); // 強化チュートリアルの対象を消したら締めへ
      addLog([`✨ ${st === "atk" ? "攻撃" : "防御"}強化 ×${factor.toFixed(1)} を準備！（攻撃の直前に計算）`]);
      if (horn > 0) addLog([`📯 号令: ${st === "atk" ? "防御" : "攻撃"}にも ×${horn.toFixed(2)}`]);
    } else if (act === "heal" && skill === "store") {
      // 蓄積キャラ：消した数を累積し、攻撃と防御の両方へ加算（累積はバトルごとにリセット・切替なし）
      const sinc = hasR("storegem") ? 2 : 1; // ノア専用レリックで1ドロップ＝蓄積+2
      // 蓄積石はドロップ1個分(count)に加えて効果分+2（強化+4）も貯まる
      const spAdd = (info.sp.store + info.spu.store) * 2;
      // スター/トリプル(info.mult)は消した数ぶんの蓄積に乗る（蓄積石の効果分は剣/盾と同じ固定値扱い）
      storeRef.current += info.count * sinc * info.mult + spAdd;
      setStoreView(storeRef.current);
      // 攻防への加算は「予約」だけ。実際に足すのはガレスの強化と同じくターン解決の攻撃直前
      // （＝蓄積を先に消しても、後から積んだ攻撃/防御にちゃんと乗る）
      turnRef.current.storePend = { add: storeRef.current };
      if (spAdd > 0) addLog([`📚 蓄積石 +${spAdd}`]);
      addLog([`📚 蓄積 ${storeRef.current} を準備！（攻撃の直前に加算）`]);
      ctutFinish(); // 蓄積チュートリアルの対象を消したら締めへ
    } else if (act === "heal" && skill === "smith") {
      // 鍛冶キャラ・補充：消した数だけ素材を貯める（回復はしない）。名工の金床で2倍・スター/トリプル(info.mult)も乗る
      const sAdd = info.count * (hasR("anvil") ? 2 : 1) * info.mult;
      stockRef.current += sAdd;
      setStockView(stockRef.current);
      addLog([`📦 素材 +${sAdd}（計 ${stockRef.current}）`]);
      ctutFinish(); // 鍛冶チュートリアルの対象を消したら締めへ
    } else {
      turnRef.current[act] += mainAdd;
    }
    if (eff.splitAtk) turnRef.current.atk += eff.splitAtk;
    if (eff.splitDef) turnRef.current.def += eff.splitDef;
    if (eff.healBonus) turnRef.current.heal += eff.healBonus;
    if (info.sp.pierce > 0) turnRef.current.pierce = true;
    if (act === "atk" && info.sp.aoe > 0) {
      turnRef.current.aoe = true;
      if (info.spu.aoe > 0) turnRef.current.aoeUp = true;
    }
    // 蓄積石：攻撃/防御で消しても効果分の蓄積が貯まる（蓄積アクション分はheal枝で加算済み）
    if (skill === "store" && act !== "heal" && info.sp.store > 0) {
      const add = (info.sp.store + info.spu.store) * 2; // 通常+2・強化済みは+4
      storeRef.current += add;
      setStoreView(storeRef.current);
      addLog([`📚 蓄積石 +${add}（蓄積 ${storeRef.current}）`]);
    }
    if (info.sp.gold > 0) {
      const g = (info.sp.gold - info.spu.gold) * 5 + info.spu.gold * 12;
      setCoinsBoth(coinsRef.current + g);
      SFX.coin();
      addLog([`金 コイン+${g}`]);
    }
    // 魔鉱石（ブロム）: 鍛冶素材を+1（強化+2）
    if (skill === "smith" && info.sp.ore > 0) {
      const oAdd = (info.sp.ore - info.spu.ore) + info.spu.ore * 2;
      stockRef.current += oAdd;
      setStockView(stockRef.current);
      addLog([`鉱 素材 +${oAdd}（計 ${stockRef.current}）`]);
    }
    syncTurn();
    if (info.junk) SFX.tap();
    else SFX.clear();
    const ll = [];
    if (info.sp.bombx || info.sp.bombd) ll.push(`爆発！計${info.count}個を消した`);
    if (info.starOn) ll.push(`★ ${info.base}個消し ${info.mult}倍`);
    else if (info.threeOn) ll.push("3 ちょうど3個 3倍");
    if (eff.splitAtk) ll.push(`剣 攻撃+${eff.splitAtk}`);
    if (eff.splitDef) ll.push(`盾 防御+${eff.splitDef}`);
    if (eff.healBonus) ll.push(`♥ 回復+${eff.healBonus}`);
    if (info.sp.pierce > 0) ll.push("貫 攻撃が貫通化！");
    if (act === "atk" && info.sp.aoe > 0) ll.push("全 攻撃が全体化！");
    if (info.sp.bolt > 0) ll.push("雷 同色を全消し！");
    if (ll.length) addLog([ll.join(" / ")]);
    const newUsed = new Set(usedRef.current);
    newUsed.add(act);
    setUsed(newUsed); usedRef.current = newUsed;
    // ==== 消去演出（盤面が消える前に座標を取る）====
    // 通常範囲(素の同色グループ)を先に消す → 特殊エフェクト → 追加分を消す
    const baseIds = findGroup(boardRef.current, idx);
    const hasExtra = ids.size > baseIds.size;
    const clearedIdxs = [], bombIdxs = [];
    boardRef.current.forEach((c, i) => {
      if (!ids.has(c.id)) return;
      clearedIdxs.push(i);
      if (c.special === "bombx" || c.special === "bombd") bombIdxs.push(i);
    });
    const linevCols = [...new Set(boardRef.current.map((c, i) => (ids.has(c.id) && c.special === "linev") ? (i % SIZE) : -1).filter(x => x >= 0))];
    const linehRows = [...new Set(boardRef.current.map((c, i) => (ids.has(c.id) && c.special === "lineh") ? ((i / SIZE) | 0) : -1).filter(x => x >= 0))];
    const boltExtra = boardRef.current.map((c, i) => (ids.has(c.id) && !baseIds.has(c.id) && info.sp.bolt > 0) ? i : -1).filter(i => i >= 0);
    const r0 = Math.floor(idx / SIZE), c0 = idx % SIZE;
    const xgTrig = hasR("xgem") && baseIds.size === 5 && hasExtra;
    const playEffects = () => {
      const explode = bombIdxs.slice();
      if (blast) explode.push(idx);
      // X字晶(xgem): タップ位置から斜め4方向のセルすべてを爆破し、X字状の爆発に
      if (xgTrig) {
        for (let d = 1; d < SIZE; d++) {
          [[r0 + d, c0 + d], [r0 + d, c0 - d], [r0 - d, c0 + d], [r0 - d, c0 - d]].forEach(rc => {
            if (rc[0] >= 0 && rc[0] < SIZE && rc[1] >= 0 && rc[1] < SIZE) explode.push(rc[0] * SIZE + rc[1]);
          });
        }
        explode.push(idx);
      }
      if (explode.length) boomAt(explode);
      let sweptLine = false;
      // 縦裂(linev)/横薙(lineh): 1列消しを棒状の爆破で表現
      linevCols.forEach(c => { barBlast("v", colCells(c)); sweptLine = true; });
      linehRows.forEach(r => { barBlast("h", rowCells(r)); sweptLine = true; });
      // 十字晶(cross): 縦バー＋横バー＋中心の爆発でクロス状の爆破に
      if (cross) { barBlast("v", colCells(c0)); barBlast("h", rowCells(r0)); boomAt([idx]); sweptLine = true; }
      // 核レリック(redcore等4色): 消した各同色の上下を、縦の棒状爆破で見せる
      if (red && red.length) {
        const N2 = SIZE * SIZE;
        red.forEach(i => barBlast("v", [i - SIZE, i, i + SIZE].filter(k => k >= 0 && k < N2 && (k % SIZE) === (i % SIZE))));
        SFX.crack(); // 盤面の爆破演出では画面を揺らさない（画面揺れは実ダメージが入る瞬間だけ）
      }
      if (sweptLine) SFX.swish();
      if (boltExtra.length) lightningAt(boltExtra);
    };
    const finishClear = () => {
      commitBoard(next);
      setClearing(new Set());
      syncBag();
      if (gtutRef.current === "clear") { setGuide("done"); } // 5+グループを防御で消したら締めテキストへ
      if (newUsed.size >= 3) {
        setTimeout(() => resolveTurn(), FAST ? 60 : 350);
      } else {
        const nextAct = nextInOrder(newUsed);
        setAction(nextAct); actionRef.current = nextAct;
        setLocked(false); lockedRef.current = false;
      }
    };
    setLocked(true); lockedRef.current = true;
    if (!hasExtra) {
      // 特殊拡張なし → 従来どおり一括で消す
      if (bombIdxs.length) boomAt(bombIdxs);
      if (!info.junk) flyParticles(clearedIdxs, act);
      setClearing(new Set(ids));
      setTimeout(finishClear, FAST ? 40 : 240);
    } else {
      // 段階演出: 通常範囲を消す → エフェクト → 追加分を消す
      setClearing(new Set(baseIds));
      setTimeout(() => {
        playEffects();
        setTimeout(() => {
          setClearing(new Set(ids));
          if (!info.junk) flyParticles(clearedIdxs, act);
          setTimeout(finishClear, FAST ? 30 : 220);
        }, FAST ? 20 : 300);
      }, FAST ? 20 : 190);
    }
  }, [resolveTurn]);
  commitRef.current = commit;

  // ===== 賭博師のコイントス =====
  // コインの出目（テストでは coinRigRef で固定できる）
  const gambleFlip = () => coinRigRef.current || (Math.random() < 0.5 ? "angel" : "demon");
  // 天使/悪魔を選択 → 回転演出 → 出目判定
  const gambleChoose = pick => {
    const ask = gambleAskRef.current;
    if (!ask || ask.phase !== "pick") return;
    SFX.pick();
    setGambleAsk({ ...ask, pick, phase: "spin", face: null, win: null });
    setTimeout(() => gambleSpinDone(pick, ask.retries), FAST ? 120 : 1000);
  };
  // 回転が終わって出目が出た瞬間。外れ＆チップ残ありなら自動でやり直す
  // 初回チュートリアル中はどちらを選んでも必ず的中させる（rigCoinより優先）
  const gambleSpinDone = (pick, retriesLeft) => {
    const face = (ctutRef.current && ctutRef.current.skill === "gamble") ? pick : gambleFlip();
    const win = face === pick;
    SFX.coin();
    if (!win && retriesLeft > 0) {
      setGambleAsk(a => a ? { ...a, phase: "retry", face, win: false } : a);
      setTimeout(() => {
        setGambleAsk(a => a ? { ...a, phase: "spin", face: null, retries: retriesLeft - 1 } : a);
        setTimeout(() => gambleSpinDone(pick, retriesLeft - 1), FAST ? 120 : 800);
      }, FAST ? 140 : 900);
      return;
    }
    setGambleAsk(a => a ? { ...a, phase: "result", face, win } : a);
    if (win) SFX.win();
    // 失敗は「はずれ…」を一拍見せてから閉じ、閉じた後に大きくダメージを出す
    setTimeout(() => gambleFinish(pick, win), FAST ? 160 : win ? 1100 : 1300);
  };
  // 結果確定：効果を発動（当たり=全部 / 外れ＋幸運の銀貨=50% / 外れ=なし）→ HPコストを支払う → ターン進行
  const gambleFinish = (pick, win) => {
    if (statusRef.current !== "battle") { gamblePendRef.current = null; setGambleAsk(null); return; } // 中断後の残タイマーを無効化
    const pend = gamblePendRef.current;
    if (!pend) { setGambleAsk(null); return; }
    const { mode, count, cost } = pend;
    const starMul = pend.mult || 1; // スター/トリプル: 効果にだけ乗る（コストは素のcount基準のまま）
    const pactWin = win && pick === "demon" && hasR("devilpact"); // 悪魔の契約: 悪魔を当てたときだけ倍率アップ
    const boost = pactWin ? GAMBLE_PACT_MUL : 1;
    const scale = win ? 1 : (hasR("luckcoin") ? GAMBLE_LUCK_RATE : 0); // 幸運の銀貨: 外れても効果の50%
    const logs = [];
    let shownAmt = 0; // ボタン表示用の結果値（回復量/虹の数/倍率）
    if (scale > 0) {
      if (mode === "heal2") {
        // 回復はここでは発動しない。他キャラと同じくターン解決の回復フェーズで反映される（予約のみ）
        const amt = Math.max(1, Math.round(count * GAMBLE_HEAL_PER * scale * boost * starMul));
        turnRef.current.heal += amt; syncTurn();
        shownAmt = amt;
        logs.push(`🪙 治癒の賭け${win ? "的中" : "（幸運）"}！回復+${amt}を準備`);
      } else if (mode === "rain") {
        const n = Math.max(1, Math.floor(count * scale * boost * starMul));
        // 盤面全体からランダムに選んで虹化（消した跡に固まらないように）。特殊なしを優先
        const pos = boardRef.current.map((c, i) => (!c.wild && c.type !== JUNK) ? i : -1).filter(i => i >= 0);
        const cand = shuffle(pos.filter(i => !boardRef.current[i].special)).concat(shuffle(pos.filter(i => boardRef.current[i].special)));
        const targets = cand.slice(0, n);
        // 1個ずつ順番に「白いバースト→虹化」させる（変換の瞬間が見えるように）。FAST時は間隔なし
        targets.forEach((ti, k) => setTimeout(() => {
          const nb = boardRef.current.slice();
          nb[ti] = { ...nb[ti], wild: true };
          commitBoard(nb);

          const ctOn = ctut && ["btn","cycle1","cycle2","toggle","mode1"].includes(ctut.step);
          const ctSwatch = ctut && (ctut.step === "cycle1" || ctut.step === "cycle2"); // インク色スウォッチの強調
          let title, glyph, valEl, iconEl;
          if (curSkill === "recolor") {
            title = "色変え";
            iconEl = h("span", { style:{ width:18, height:18, marginTop:5, borderRadius:5, border:"2px solid rgba(255,255,255,.85)", background:`linear-gradient(180deg,${DROPS[paintColor].c1},${DROPS[paintColor].c2})`, flexShrink:0,
              boxShadow: ctSwatch ? "0 0 0 3px #fff, 0 0 14px #ffd75e" : "none", transform: ctSwatch ? "scale(1.3)" : "none", transition:"transform .2s ease, box-shadow .2s ease" } });
            valEl = h("span", { style:{ fontSize:"0.72rem", fontWeight:800 } }, "インク");
          } else if (curSkill === "smith") {
            title = smithMode === "stock" ? "補充" : smithMode === "gen" ? "生成" : "強化＋";
            iconEl = h("img", { src: smithMode === "stock" ? "assets/sk_stock.png" : smithMode === "gen" ? "assets/sk_gen.png" : "assets/sk_forge.png", alt:"", draggable:false, width:18, height:18, style:{ width:18, height:18, maxWidth:18, maxHeight:18, marginTop:5, objectFit:"contain", filter:"drop-shadow(0 1px 1px rgba(0,0,0,.4))" } });
            // 素材の増減プレビュー（ドロップ選択中・金色で消した/使った後の値を表示）:
            //   補充=+消す数（金床2倍）+魔鉱石分 / 生成・強化=使う素材を差し引いた残り / 攻・防でも魔鉱石分は増加を予測
            let stPrev = null;
            if (info && !isUsed) {
              const oreN = (info.sp.ore || 0) - (info.spu.ore || 0) + (info.spu.ore || 0) * 2;
              if (isSel && smithMode === "stock") stPrev = stockView + info.count * (hasR("anvil") ? 2 : 1) * info.mult + oreN;
              else if (isSel && preview && preview.ids) {
                const cells = board.filter(c => preview.ids.has(c.id));
                let n = 0;
                if (smithMode === "gen") {
                  const targets = cells.filter(c => c.type !== JUNK && !c.wild && !c.special).length;
                  n = Math.min(stockView, targets); // 生成は袋会計と無関係の複製なので所持数ではキャップしない
                } else n = Math.min(stockView, cells.filter(c => c.special && !c.up).length);
                if (n > 0) stPrev = stockView - n;
              } else if (!isSel && oreN > 0 && (action === "atk" || action === "def")) stPrev = stockView + oreN;
            }
            // 素材数はチュートリアルのプレゼント演出中（gift/giftfx）に金色で強調＋値変化でパルス
            valEl = stPrev != null
              ? h("span", { id:"smith-stockval", style:{ fontSize:"0.9rem", fontWeight:900, color:"#ffd75e" } }, "素材", stPrev)
              : h("span", { id:"smith-stockval", key:"sv" + stockView, className: stockView > 0 ? "val-pulse" : "",
                style:{ fontSize:"0.9rem", fontWeight:900, color: ctut && (ctut.step === "gift" || ctut.step === "giftfx") ? "#ffd75e" : undefined } }, "素材", stockView);
          } else if (curSkill === "buff") {
            const incN = hasR("warforge2") ? 0.3 : hasR("warforge") ? 0.2 : 0.1;
            title = "強化→" + tgtLabel;
            // アイコンは強化対象に合わせて剣（攻撃）/盾（防御）
            iconEl = h("img", { src: skillTarget === "atk" ? "assets/icon_atk.png" : "assets/icon_def.png", alt:"", draggable:false, width:18, height:18,
              style:{ width:18, height:18, maxWidth:18, maxHeight:18, marginTop:5, objectFit:"contain", filter:"drop-shadow(0 1px 1px rgba(0,0,0,.4))" } });
            // 使用後は予約中の倍率をターン終了まで表示 / ドロップ選択中は実倍率プレビュー / 未選択時は単価
            const selN = isSel && info ? info.count : 0;
            const wcB = isSel && info ? ((info.sp.warcry || 0) - (info.spu.warcry || 0)) * 0.2 + (info.spu.warcry || 0) * 0.4 : 0;
            // 倍率確定（buffPend→null）後も buffAnim が残っている間は倍率を出し続ける。
            // これが無いと計算した瞬間に「+0.1/個」へ戻ってしまう
            const shownMult = tv.buffPend ? tv.buffPend.mult : buffAnim ? buffAnim.mult : null;
            valEl = isUsed && shownMult != null
              ? h("span", { style:{ fontSize:"1rem", fontWeight:900, color:"#ffd75e" } }, "×" + shownMult.toFixed(1))
              : selN > 0
              ? h("span", { style:{ fontSize:"1rem", fontWeight:900, color:"#ffd75e" } }, "×" + (1 + (incN * selN + wcB) * info.mult).toFixed(1))
              : h("span", { style:{ fontSize:"0.9rem", fontWeight:900 } }, "+" + incN + "/個");
          } else if (curSkill === "gamble") {
            // ガレス/ブロムと同じ事前トグル。ボタンタップで 治癒→虹→剛運→鉄運 と循環する
            const gm = (TX.gamble && TX.gamble.modes && TX.gamble.modes[gambleMode]) || { lbl:"賭け" };
            // アイコンは賭けの内容に合わせる: 治癒=ハート / 剛運=剣 / 鉄運=盾 / 虹=虹ドロップ（盤面と同じ虹グラデの角丸）
            const gIconImg = { heal2:"assets/mk_heart.png", atkx:"assets/icon_atk.png", defx:"assets/icon_def.png" }[gambleMode];
            iconEl = gambleMode === "rain"
              ? h("span", { style:{ width:16, height:16, marginTop:6, borderRadius:5, display:"inline-block",
                  background:"linear-gradient(135deg,#ff6b6b 0%,#ffcf5d 24%,#7cffb0 48%,#5aa0ff 72%,#c9a2ff 100%)",
                  boxShadow:"inset 0 0 0 1.5px rgba(255,255,255,.85)", filter:"drop-shadow(0 1px 1px rgba(0,0,0,.4))" } })
              : h("img", { src: gIconImg, alt:"", draggable:false, width:18, height:18,
                  style:{ width:18, height:18, maxWidth:18, maxHeight:18, marginTop:5, objectFit:"contain", filter:"drop-shadow(0 1px 1px rgba(0,0,0,.4))" } });
            const selN = isSel && info ? info.count : 0;
            const cost = selN > 0 ? gambleCost(gambleMode, selN) : 0;
            const willDie = selN > 0 && pHP - cost <= 0; // 外したら倒れる＝赤で警告
            // 使用後はコイントスの結果（賭けた数・結果値）を次のターンのリセットまで表示し続ける
            const gs = isUsed ? tv.gambleShown : null;
            // 攻撃/防御ボタンと同じ構造に合わせる: タイトル行(11px)=「HP{基礎}×数」(代償)、数値行=「{効果}×数」
            title = "HP" + GAMBLE_COST[gambleMode] + "×" + (gs ? gs.count : selN);
            // 治癒は実回復量「+N(×2)」、それ以外は「{効果}×数」。(×2)だけタイトル行と同じ11pxで小さく添える
            const gMul = isSel && info ? info.mult : 1; // スター/トリプルは効果にだけ乗る（HPコストは素のcount）
            const effTxt = gambleMode === "heal2"
              ? [gm.lbl + "+" + selN * GAMBLE_HEAL_PER * gMul,
                 h("span", { key:"x", style:{ fontSize:11, fontWeight:800, marginLeft:1, opacity:0.85 } }, "(×" + GAMBLE_HEAL_PER + ")")]
              : gm.lbl + "×" + selN * gMul;
            const fmtN = v => (v % 1 ? v.toFixed(1) : v);
            valEl = gs
              // 結果表示: 的中/幸運=金色で効果値、丸外れ=赤「はずれ」
              ? (gs.amt > 0
                ? h("span", { style:{ fontSize:"0.92rem", fontWeight:900, color:"#ffd75e" } },
                    gs.mode === "heal2" ? gm.lbl + "+" + fmtN(gs.amt) : gm.lbl + "×" + fmtN(gs.amt))
                : h("span", { style:{ fontSize:"0.92rem", fontWeight:900, color:"#ff8a8a" } }, "はずれ"))
              : h("span", { style:{ fontSize:"0.92rem", fontWeight:900, color: selN > 0 ? (willDie ? "#ff6a6a" : "#ffd75e") : "#e0d8f0", textShadow: willDie ? "0 0 8px rgba(255,60,60,.9)" : "none" } },
                  effTxt);
          } else {
            title = "蓄積";
            iconEl = h("img", { src:"assets/mk_store.png", alt:"", draggable:false, width:18, height:18, style:{ width:18, height:18, maxWidth:18, maxHeight:18, marginTop:5, objectFit:"contain", filter:"drop-shadow(0 1px 1px rgba(0,0,0,.4))" } });
            // ドロップ選択中は消した後の蓄積値を金色でプレビュー
            // 蓄積アクション=count+蓄積石の効果分／攻・防アクション選択中でも蓄積石の効果分(+2/強化+4)を反映
            const spN = info ? ((info.sp.store || 0) + (info.spu.store || 0)) * 2 : 0;
            const sN = isSel && info ? info.count * (hasR("storegem") ? 2 : 1) * info.mult + spN : spN;
            valEl = sN > 0
              ? h("span", { style:{ fontSize:"1rem", fontWeight:900, color:"#ffd75e" } }, "+" + (storeView + sN))
              : h("span", { style:{ fontSize:"1rem", fontWeight:900 } }, "+" + storeView);
          }
          const skillTap = () => {
              if (isUsed || locked) return;
              const ct = ctutRef.current;
              // チュートリアル中は誘導ステップ以外でのボタン操作を禁止（対象指定中の色替え等で混乱しないように）
              if (ct && !["cycle1","cycle2","toggle","mode1"].includes(ct.step)) return;
              // タップ＝モード切替（選択中かどうかは問わない。順番はドラッグで決める）
              if (curSkill === "recolor") { setPaintColor((paintColor + 1) % 4); SFX.mode(); }
              else if (curSkill === "smith") { setSmithMode(smithMode === "stock" ? "gen" : smithMode === "gen" ? "up" : "stock"); SFX.mode(); }
              else if (curSkill === "buff") { setSkillTarget(skillTarget === "atk" ? "def" : "atk"); SFX.mode(); }
              else if (curSkill === "gamble") { const gi = GAMBLE_MODES.indexOf(gambleMode); setGambleMode(GAMBLE_MODES[(gi + 1) % GAMBLE_MODES.length]); SFX.mode(); }
              // チュートリアルのステップ進行（切替の体験 → 対象指定へ）
              if (ct) {
                if (ct.step === "cycle1") setCtut({ ...ct, step: "cycle2" });
                else if (ct.step === "cycle2") setCtut({ ...ct, step: "paint", seed: pickCtutSeed(true) });
                else if (ct.step === "toggle") {
                  // 賭博師は「鉄運（防御）」になるまでタップさせてから消去体験へ（このタップで切り替わった後のモードで判定）
                  if (curSkill === "gamble") {
                    const after = GAMBLE_MODES[(GAMBLE_MODES.indexOf(gambleMode) + 1) % GAMBLE_MODES.length];
                    if (after === "defx") setCtut({ ...ct, step: "clear", seed: pickCtutSeed(false) });
                  } else setCtut({ ...ct, step: "clear", seed: pickCtutSeed(false) });
                }
                else if (ct.step === "mode1") setCtut({ ...ct, step: "gift" }); // 生成モードに切替→素材プレゼントカードへ
              }
          };
          return h("button", { key, ...dragProps,
            onPointerUp: actDragEnd,
            onPointerCancel: actDragEnd,
            onClick: () => actTap(skillTap),
            disabled:isUsed,
            className:"act-h relative rounded-xl flex flex-col items-center justify-center overflow-hidden",
            style:{ touchAction:"none", background: isUsed ? "rgba(14,11,20,.85)" : isSel ? "rgba(255,255,255,.06)" : "rgba(30,24,42,.92)",
              border:`2px solid ${isUsed ? "#2c2740" : isSel ? sc : "#3c3450"}`,
              boxShadow: ctOn ? "0 0 0 3px #ffe08a, 0 0 18px rgba(255,207,93,.9)" : "none",
              zIndex: ctOn ? 46 : "auto", position:"relative",
              // 倍率予約中はターン終了まで読めるよう、使用後でも明るさを残す
              opacity: isUsed ? ((curSkill === "buff" && tv.buffPend) || (curSkill === "gamble" && tv.gambleShown) ? 0.9 : 0.4) : 1, transition:"background .25s ease, border-color .25s ease, opacity .25s ease, box-shadow .25s ease", ...(dragSt || {}) } },
            h("span", { style:{ position:"absolute", top:0, left:"14%", right:"14%", height:3, borderRadius:"0 0 4px 4px", background:sc, opacity: isUsed ? 0.25 : 0.9, pointerEvents:"none" } }),
            iconEl,
            h("span", { style:{ fontSize:11, height:15, lineHeight:"15px", whiteSpace:"nowrap", color: isUsed ? "#777" : "#e7e0ef" } }, title),
            h("span", { style:{ fontSize:"1.05rem", height:20, lineHeight:"20px", display:"flex", alignItems:"center", justifyContent:"center", color: isUsed ? sc : "#e0d8f0" } }, valEl));
        }
        const a = ACTIONS[key];
        const isUsed = used.has(key);
        const isSel = action === key && !isUsed;
        const crossBonus = !isSel && selEff ? (key === "atk" ? selEff.splitAtk : key === "def" ? selEff.splitDef : selEff.healBonus) : 0;
        const mkBreakdown = (total, base, bonus, tc) => h("span", { style:{ display:"flex", alignItems:"baseline", gap:2, justifyContent:"center" } },
          h("span", { style:{ fontSize:"1.15rem", color:tc, fontWeight:900, textShadow:`0 0 8px ${tc}` } }, total),
          h("span", { style:{ fontSize:"0.58rem", opacity:0.6 } }, `(+${bonus})`));
        let valEl;
        const bAn = buffAnim && buffAnim.st === key ? buffAnim : null;
        const sAn = storeAnim && (key === "atk" || key === "def") ? storeAnim : null;
        if (bAn) {
          // ガレス強化の段階表示: 元の値 → 「元の値 ×倍率」 → 最終値（金色・倍率を併記）
          valEl = bAn.stage === 1 ? String(bAn.from)
            : bAn.stage === 2 ? h("span", null, String(bAn.from),
                h("span", { style:{ color:"#ffd75e", fontSize:"0.82rem", marginLeft:3, fontWeight:900 } }, "×" + bAn.mult.toFixed(1)))
            : h("span", null, h("span", { style:{ color:"#ffd75e" } }, String(bAn.to)),
                h("span", { style:{ color:"#ffd75e", fontSize:"0.82rem", marginLeft:3, fontWeight:900, opacity:0.85 } }, "×" + bAn.mult.toFixed(1)));
        } else if (sAn) {
          // ノア蓄積の段階表示（攻防同時）: 「元の値 +蓄積」 → 最終値（金色）
          const from = key === "atk" ? sAn.fromAtk : sAn.fromDef;
          const to = key === "atk" ? sAn.toAtk : sAn.toDef;
          valEl = sAn.stage === 2 ? h("span", null, String(from),
              h("span", { style:{ color:"#ffd75e", fontSize:"0.82rem", marginLeft:3, fontWeight:900 } }, "+" + sAn.add))
            // 加算し終えたら「+N」は消して最終値だけ見せる
            : h("span", { style:{ color:"#ffd75e" } }, String(to));
        } else if (isSel && selEff) {
          let v = selEff.main;
          if (key === "atk") v += selEff.splitAtk;
          if (key === "def") v += selEff.splitDef;
          if (key === "heal") v += selEff.healBonus;
          const base = dispTv[key];
          valEl = base > 0 ? mkBreakdown(base + v, base, v, info && info.mult > 1 ? "#ffe88a" : "#fff") : `+${v}`;
        } else if (crossBonus > 0) {
          const base = dispTv[key];
          valEl = base > 0 ? mkBreakdown(base + crossBonus, base, crossBonus, "#ffcf5d") : `+${crossBonus}`;
        } else valEl = String(dispTv[key]);
        // ノアの蓄積は予約中（解決前）も攻撃・防御の両方に「+N」を出しっぱなしにする
        if (!bAn && !sAn && (key === "atk" || key === "def") && tv.storePend) {
          valEl = h("span", null, valEl,
            h("span", { style:{ color:"#b9a4ff", fontSize:"0.82rem", marginLeft:3, fontWeight:900 } }, "+" + tv.storePend.add));
        }
        // 強化の倍率計算中は対象ボタン、蓄積の加算中は攻撃・防御の両方を光らせる（暗転も解除）。
        // 光らせるのは計算中の stage2 だけ。stage3（×倍率を出したまま待つ段階）は
        // ターン終了まで残るので、そこまで lit にすると使用済みで暗くなったはずのボタンが
        // ターン中ずっと明るいままになり、防御が敵の攻撃時に光り直す演出も潰れる
        const litBuff = !!(bAn && bAn.stage === 2), litStore = !!(sAn && sAn.stage === 2);
        const lit = (fx.length > 0 && fx[fx.length-1].act === key) || litBuff || litStore;
        const gWarn = gtut === "warn", gDef = gtut === "def", gClear = gtut === "clear";
        const guideTgt = gDef && key === "def";        // 「防御」を光らせて誘導
        const guideOff = gWarn || (gDef && key !== "def") || gClear || (ctut && ctut.step !== "done"); // 誘導中の対象外ボタンは暗く
        const disabledBtn = isUsed || gWarn || gClear || (gDef && key !== "def") || (ctut && ctut.step !== "done");
        return h("button", { key, ...dragProps,
          onPointerUp: actDragEnd,   // タップでは選択しない（順番はドラッグで入れ替える）
          onPointerCancel: actDragEnd,
          onClick: () => actTap(null),
          disabled:disabledBtn,
          className:"act-h relative rounded-xl flex flex-col items-center justify-center overflow-hidden",


          style:{
            background: isUsed ? (lit ? a.bg : "rgba(14,11,20,.85)") : (isSel || guideTgt) ? a.bg : "rgba(30,24,42,.92)",
            border: `2px solid ${isUsed ? (lit ? a.color : "#2c2740") : (isSel || guideTgt) ? a.color : "#3c3450"}`,
            boxShadow: guideTgt ? `0 0 0 3px ${a.color}, 0 0 18px ${a.color}` : lit ? `0 0 0 3px ${a.color}` : "none",
            animation: lit ? "actPulse .55s ease" : "none",
            opacity: guideOff ? 0.26 : isUsed ? (lit ? 1 : 0.4) : 1,
            zIndex: guideTgt ? 46 : "auto", touchAction:"none",
            transition:"background .25s ease, border-color .25s ease, box-shadow .25s ease, opacity .25s ease", ...(dragSt || {}) } },
          h("span", { style:{ position:"absolute", top:0, left:"14%", right:"14%", height:3, borderRadius:"0 0 4px 4px", background:a.color, opacity: isUsed && !lit ? 0.25 : 0.9, pointerEvents:"none" } }),
          h("img", { src:a.img, alt:a.label, draggable:false, width:20, height:20, style:{ height:20, width:20, maxWidth:20, maxHeight:20, flexShrink:0, marginTop:5, objectFit:"contain", opacity: isUsed && !lit ? 0.35 : 1, filter:"drop-shadow(0 2px 1px rgba(0,0,0,.45))" } }),
          h("span", { style:{ fontSize:11, height:15, lineHeight:"15px", whiteSpace:"nowrap", color: isUsed ? (lit ? "#e7e0ef" : "#777") : "#e7e0ef" } }, a.label,
            // 表示倍率はキャラ補正込みの実効値（ルクスの全効果2倍もここに反映。レリック加算はperOf内）
            h("span", { style:{ fontSize:8, opacity:0.5, marginLeft:2 } }, "×", perOf(key) * (CUR_SKILL === "healx" ? 2 : 1))),
          h("span", { id:"actval-" + key, key:"v" + key + "_" + tv[key] + (bAn ? "_b" + bAn.stage : "") + (sAn ? "_s" + sAn.stage : ""), className: tv[key] > 0 ? "val-pulse" : "",
            style:{ fontSize:"1.05rem", height:20, lineHeight:"20px", fontWeight:700, fontVariantNumeric:"tabular-nums", display:"flex", alignItems:"center", justifyContent:"center",
            color: lit ? "#ffffff" : isSel && selEff && tv[key] === 0 ? (info && info.mult > 1 ? "#ffe88a" : "#fff") : crossBonus > 0 && tv[key] === 0 ? "#ffcf5d" : isUsed ? a.color : tv[key] > 0 ? "#e0d8f0" : "#9b93a6",
            textShadow: isSel && selEff && tv[key] === 0 && info && info.mult > 1 ? "0 0 8px #ffd54a" : "none" } }, valEl));
      })),
      // 盤面
      boardEl,
      overlays));
}

  var root = RD.createRoot(document.getElementById('root'));
  root.render(h(DropBattle));
})();
</script>
</body>
</html>
